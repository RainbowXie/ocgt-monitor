<!DOCTYPE html>
<html lang=zh-CN>
<head>
<meta charset=UTF-8>
<meta name=viewport content="width=device-width,initial-scale=1.0">
<title>OpenCode Go 监控面板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0d1117;color:#c9d1d9;padding:0;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh}
.header{background:#161b22;border-bottom:1px solid #30363d;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header h1{color:#58a6ff;font-size:16px;font-weight:600}
.header-right{display:flex;align-items:center;gap:12px;font-size:12px;color:#8b949e}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#3fb950;margin-right:6px}
.status-dot.error{background:#f85149}
.content{flex:1;overflow-y:auto;padding:20px 24px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.stat-card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;text-align:center}
.stat-card .label{font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.stat-card .value{font-size:28px;font-weight:700}
.stat-card .value.green{color:#3fb950}
.stat-card .value.blue{color:#58a6ff}
.stat-card .value.yellow{color:#d29922}
.stat-card .value.purple{color:#a371f7}
.row{display:flex;gap:16px;margin-bottom:16px}
.col{flex:1}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:20px;height:100%}
.card-title{font-size:13px;font-weight:600;color:#f0f6fc;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card-title .badge{font-size:10px;background:#21262d;color:#8b949e;padding:1px 8px;border-radius:10px;font-weight:400}
.bar-row{display:flex;align-items:center;gap:10px;margin:10px 0}
.bar-label{width:72px;font-size:12px;font-weight:600;flex-shrink:0}
.bar-track{flex:1;background:#21262d;border-radius:4px;height:22px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:4px;transition:width .8s ease;position:relative}
.bar-fill::after{content:attr(data-pct);position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:11px;font-weight:600;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.5)}
.rolling .bar-fill{background:linear-gradient(90deg,#2ea043,#3fb950)}
.weekly .bar-fill{background:linear-gradient(90deg,#d29922,#e3b341)}
.monthly .bar-fill{background:linear-gradient(90deg,#1f6feb,#58a6ff)}
.bar-reset{width:56px;font-size:11px;color:#8b949e;text-align:right;flex-shrink:0}
.balance-val{font-size:14px;margin:8px 0}
.balance-val .num{font-size:22px;font-weight:700;color:#7ee787}
.balance-val .cur{color:#8b949e;font-size:13px;margin-left:4px}
.balance-sub{font-size:12px;color:#8b949e;margin:4px 0}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 6px;color:#8b949e;font-weight:500;border-bottom:1px solid #21262d;font-size:11px}
td{padding:7px 6px;border-bottom:1px solid #21262d;color:#c9d1d9}
tr:hover td{background:#1c2128}
.model-name{max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chart-container{position:relative;height:220px;margin-top:8px}
.error-msg{color:#f85149;font-size:13px;padding:20px;text-align:center}
.loading{padding:20px;text-align:center;color:#8b949e;font-size:13px}
.footer-bar{background:#161b22;border-top:1px solid #30363d;padding:8px 24px;display:flex;justify-content:space-between;font-size:11px;color:#8b949e;flex-shrink:0}
@media(max-width:768px){.grid{grid-template-columns:repeat(2,1fr)}.row{flex-direction:column}}
</style>
</head>
<body>
<div class=app>
<div class=header>
<h1>OpenCode Go 监控面板</h1>
<div class=header-right>
<span id=status-text><span class=status-dot id=status-dot></span>运行中</span>
<span id=refresh-time>等待刷新...</span>
</div>
</div>

<div class=content>
<!-- 今日统计卡片 -->
<div class="grid" id=today-grid>
<div class=stat-card><div class=label>今日输入</div><div class="value blue" id=today-input>--</div></div>
<div class=stat-card><div class=label>今日输出</div><div class="value yellow" id=today-output>--</div></div>
<div class=stat-card><div class=label>今日总计</div><div class="value green" id=today-total>--</div></div>
<div class=stat-card><div class=label>请求次数</div><div class="value purple" id=today-count>--</div></div>
</div>

<div class=row>
<!-- 套餐额度 -->
<div class=col>
<div class=card>
<div class=card-title>套餐额度 <span class=badge>OpenCode Go</span></div>
<div id=quota-area><div class=loading>加载中...</div></div>
</div>
</div>

<!-- 账户余额 -->
<div class=col>
<div class=card>
<div class=card-title>DeepSeek 余额 <span class=badge>按量计费</span></div>
<div id=balance-area><div class=loading>加载中...</div></div>
</div>
</div>
</div>

<div class=row>
<div class=col>
<div class=card>
<div class=card-title>各模型消耗 <span class=badge>最近 7 天</span></div>
<div id=model-area><div class=loading>加载中...</div></div>
</div>
</div>
<div class=col>
<div class=card>
<div class=card-title>每日趋势 <span class=badge>7 天</span></div>
<div class=chart-container><canvas id=token-chart></canvas></div>
</div>
</div>
</div>
</div>

<div class=footer-bar>
<span>ocgt-monitor</span>
<span id=footer-time>启动中...</span>
</div>
</div>

<script>
var chart=null;

function fn(n){if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return String(n)}

function updateStatus(ok){
var dot=document.getElementById('status-dot');dot.className='status-dot'+(ok?'':' error');
document.getElementById('status-text').innerHTML='<span class=status-dot id=status-dot class="status-dot'+(ok?'':' error')+'"></span>'+(ok?'运行中':'错误');
}

async function fetchAll(){
try{await Promise.all([fetchQuota(),fetchBalance(),fetchHistory()]);updateStatus(true)}catch(e){updateStatus(false)}
document.getElementById('refresh-time').textContent='上次更新: '+new Date().toLocaleTimeString();
document.getElementById('footer-time').textContent='更新于 '+new Date().toLocaleString('zh-CN');
}

async function fetchQuota(){
var r=await(await fetch('/api/quota')).json();
var el=document.getElementById('quota-area');
if(!r.success){el.innerHTML='<div class=error-msg>查询失败: '+r.error+'</div>';return}
var d=r.data;
el.innerHTML='<div class=bar-row><div class=bar-label style=color:#3fb950>Rolling</div><div class="bar-track rolling"><div class=bar-fill style=width:'+d.rolling.usage_percent+'% data-pct="'+d.rolling.usage_percent+'%"></div></div><div class=bar-reset>'+d.rolling.reset_display+'</div></div><div class=bar-row><div class=bar-label style=color:#e3b341>Weekly</div><div class="bar-track weekly"><div class=bar-fill style=width:'+d.weekly.usage_percent+'% data-pct="'+d.weekly.usage_percent+'%"></div></div><div class=bar-reset>'+d.weekly.reset_display+'</div></div>';
if(d.monthly)el.innerHTML+='<div class=bar-row><div class=bar-label style=color:#58a6ff>Monthly</div><div class="bar-track monthly"><div class=bar-fill style=width:'+d.monthly.usage_percent+'% data-pct="'+d.monthly.usage_percent+'%"></div></div><div class=bar-reset>'+d.monthly.reset_display+'</div></div>';else el.innerHTML+='<div style=text-align:center;color:#8b949e;padding:12px;font-size:13px>Monthly: 无限额度</div>';
}

async function fetchBalance(){
var r=await(await fetch('/api/balance')).json();
var el=document.getElementById('balance-area');
if(!r.success){el.innerHTML='<div class=error-msg>'+r.error+'</div>';return}
var d=r.data;
el.innerHTML='<div class=balance-val><span class=num>'+d.total_balance.toFixed(2)+'</span><span class=cur>'+d.currency+'</span></div>';
if(d.granted_balance>0)el.innerHTML+='<div class=balance-sub>赠送: '+d.granted_balance.toFixed(2)+'</div>';
if(d.topped_up_balance>0)el.innerHTML+='<div class=balance-sub>充值: '+d.topped_up_balance.toFixed(2)+'</div>';
}

function renderTodayStats(d){
if(!d||!d.length)return;
var t=d[d.length-1];
document.getElementById('today-input').textContent=fn(t.input_tokens||0);
document.getElementById('today-output').textContent=fn(t.output_tokens||0);
document.getElementById('today-total').textContent=fn(t.total_tokens||0);
document.getElementById('today-count').textContent=t.request_count||0;
}

async function fetchHistory(){
var r=await(await fetch('/api/history')).json();
if(!r.success)return;
renderTodayStats(r.data);
renderChart(r.data);
// Model data
var mr=await(await fetch('/api/models')).json();
renderModelTable(mr.success?mr.data:null);
}

function renderModelTable(data){
var el=document.getElementById('model-area');
if(!data||data.length===0){el.innerHTML='<div class=loading>暂无数据</div>';return}
var html='<table><tr><th>模型</th><th>输入</th><th>输出</th><th>总计</th><th>请求</th></tr>';
data.forEach(function(m){html+='<tr><td class=model-name title="'+m.model+'">'+m.model+'</td><td>'+fn(m.input_tokens||0)+'</td><td>'+fn(m.output_tokens||0)+'</td><td style=color:#3fb950>'+fn(m.total_tokens||0)+'</td><td style=color:#8b949e>'+m.request_count+'</td></tr>'});
html+='</table>';
el.innerHTML=html;
}

function renderChart(d){
if(!d||!d.length)return;
var la=d.map(function(x){return x.date}),id=d.map(function(x){return x.input_tokens||0}),od=d.map(function(x){return x.output_tokens||0});
if(chart)chart.destroy();
chart=new Chart(document.getElementById('token-chart').getContext('2d'),{type:'bar',data:{labels:la,datasets:[{label:'输入',data:id,backgroundColor:'#3fb950',borderRadius:4},{label:'输出',data:od,backgroundColor:'#58a6ff',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8b949e',boxWidth:12,font:{size:11}}}},scales:{x:{ticks:{color:'#8b949e',font:{size:10}},grid:{color:'#21262d'}},y:{ticks:{color:'#8b949e',font:{size:10},callback:function(v){return fn(v)}},grid:{color:'#21262d'}}}}})
}

fetchAll();
setInterval(fetchAll,60000);
</script>
</body>
</html>
