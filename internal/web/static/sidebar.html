<!DOCTYPE html>
<html lang=zh-CN data-theme=light>
<head>
<meta charset=UTF-8>
<meta name=viewport content="width=device-width,initial-scale=1.0">
<title>ocgt-monitor</title>
<style>
/* ── Theme: 亮色 · 灵动卡片 ── */
[data-theme=light] {
  --bg:linear-gradient(180deg,#f5f0ff 0%,#f0eef8 50%,#fef5f2 100%);
  --text:#1a1a2e; --text-sec:#a1a1b5; --text-ter:#7c3aed;
  --card:rgba(255,255,255,0.75); --card-bd:rgba(255,255,255,0.9);
  --card-sh:0 4px 20px rgba(0,0,0,0.04);
  --hdr-bg:transparent; --hdr-bd:transparent;
  --filter-bg:transparent;
  --mc-bg:rgba(255,255,255,0.75); --mc-bd:1px solid rgba(255,255,255,0.9);
  --input-bg:rgba(255,255,255,0.85); --input-bd:rgba(99,102,241,0.2);
  --accent:#6366f1; --accent2:#a855f7; --accent3:#ec4899;
  --green:#22c55e; --green-dim:rgba(34,197,94,0.3);
  --red:#ef4444;
  --bs-sec:rgba(0,0,0,0.03);
  --fl-on-bg:#fff; --fl-on-sh:0 1px 4px rgba(0,0,0,0.06);
  --mdot-bg:#22c55e; --mdot-sh:rgba(34,197,94,0.3);
  --mi-bg:transparent; 
  
  --st-col:#a1a1b5; --st-bar:#6366f1;
  --ql-col:#1a1a2e;
  --sep-col:rgba(0,0,0,0.04);
}

/* ── Theme: 暗色 · 深色专业 ── */
[data-theme=dark] {
  --bg:#0d0d1a;
  --text:#c8d6e5; --text-sec:#4a5568; --text-ter:#00b8ff;
  --card:rgba(255,255,255,0.02); --card-bd:rgba(255,255,255,0.04);
  --card-sh:none;
  --hdr-bg:rgba(255,255,255,0.02); --hdr-bd:rgba(255,255,255,0.04);
  --filter-bg:rgba(255,255,255,0.03);
  --mc-bg:transparent; --mc-bd:none;
  --input-bg:rgba(255,255,255,0.03); --input-bd:rgba(0,255,136,0.15);
  --accent:#00ff88; --accent2:#00b8ff; --accent3:#6366f1;
  --green:#00ff88; --green-dim:rgba(0,255,136,0.15);
  --red:#ff3366;
  --bs-sec:rgba(0,255,136,0.03);
  --fl-on-bg:rgba(0,255,136,0.06); --fl-on-sh:none;
  --mdot-bg:#00ff88; --mdot-sh:rgba(0,255,136,0.4);
  --mi-bg:rgba(255,255,255,0.02); 
  --mt-bg:transparent;
  --st-col:#4a5568; --st-bar:#00ff88;
  --ql-col:#4a5568;
  --sep-col:rgba(255,255,255,0.04);
}

/* ── Shared styles ── */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter','Noto Sans SC',sans-serif;background:var(--bg);width:270px;overflow:hidden;user-select:none;color:var(--text);-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
.p{display:flex;flex-direction:column;height:100vh}

/* ── Header ── */
.h{padding:10px 10px 8px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--hdr-bg);border-bottom:1px solid var(--hdr-bd);transition:background .3s}
.hl{display:flex;align-items:center;gap:7px}
.ic{width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,0.08);transition:background .3s}
.hl h1{font-size:12px;font-weight:700;letter-spacing:-.2px;color:var(--text);transition:color .3s}
.hr{display:flex;align-items:center;gap:3px}
.sd{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px var(--green-dim);transition:background .3s}
.sd.er{background:var(--red);box-shadow:0 0 0 3px rgba(255,51,102,0.2)}
.ht{font-size:9px;color:var(--text-sec);font-weight:600;font-feature-settings:"tnum";transition:color .3s}
.hb{width:20px;height:20px;border-radius:5px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text-sec);transition:all .2s}
.hb:hover{background:rgba(var(--accent),0.1);color:var(--accent)}
.hb.on{text-shadow:0 0 6px var(--accent)}
.qb{width:20px;height:20px;border-radius:5px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text-sec);transition:all .2s}
.qb:hover{background:rgba(239,68,68,0.1);color:var(--red)}

/* ── Body ── */
.c{flex:1;overflow-y:auto;padding:8px 10px 12px;scrollbar-width:thin}
.c::-webkit-scrollbar{width:2px}
.c::-webkit-scrollbar-thumb{background:var(--bs-sec);border-radius:10px}

/* ── Section title ── */
.st{font-size:8px;font-weight:700;color:var(--st-col);letter-spacing:.6px;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:5px;transition:color .3s}
.st::before{content:"";display:inline-block;width:2px;height:10px;border-radius:2px;background:linear-gradient(180deg,var(--accent),var(--accent2));transition:background .3s}

/* ── Quota card ── */
.qn{margin-bottom:8px;background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:16px;padding:10px 12px;border:var(--card-bd);box-shadow:var(--card-sh);transition:background .3s,border .3s,box-shadow .3s}
.qr{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.qr:last-child{margin-bottom:0}
.ql{font-size:9px;font-weight:600;color:var(--ql-col);transition:color .3s}
.qv{display:flex;align-items:center;gap:6px}
.qp{font-size:10px;font-weight:700;font-feature-settings:"tnum"}
.qp.g1{color:#a855f7;transition:color .3s}.qp.g2{color:#ef4444}.qp.g3{color:#3b82f6}
.qtm{font-size:8px;color:var(--text-sec);font-weight:500;font-feature-settings:"tnum";transition:color .3s}
.qbw{height:4px;border-radius:2px;background:var(--bs-sec);margin-bottom:6px;overflow:hidden;transition:background .3s}
.qbw:last-child{margin-bottom:0}
.qf{height:100%;border-radius:2px;transition:width 1s cubic-bezier(.22,1,.36,1),background .3s}
.qf.g1{background:linear-gradient(90deg,#6366f1,#a855f7,#ec4899)}
.qf.g2{background:linear-gradient(90deg,#f59e0b,#ef4444,#ec4899)}
.qf.g3{background:linear-gradient(90deg,#06b6d4,#3b82f6,#6366f1)}

/* ── Today stats ── */
.tg{display:flex;gap:4px;margin-bottom:8px}
.ti{flex:1;background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:14px;padding:7px 4px;text-align:center;border:var(--card-bd);box-shadow:var(--card-sh);transition:background .3s,border .3s,box-shadow .3s}
.tn{font-size:11px;font-weight:800;font-feature-settings:"tnum";line-height:1.2;margin-bottom:1px;overflow:hidden;text-overflow:ellipsis}
.tn.g1{color:#6366f1}.tn.g2{color:#ef4444}.tn.g3{color:#22c55e}.tn.g4{color:#a855f7}
.tl{font-size:7px;color:var(--text-sec);font-weight:600;letter-spacing:.4px;text-transform:uppercase;transition:color .3s}

/* ── Balance ── */
.bc{background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:14px;padding:8px 12px;margin-bottom:8px;border:var(--card-bd);box-shadow:var(--card-sh);display:flex;align-items:center;justify-content:space-between;transition:background .3s,border .3s,box-shadow .3s}
.bl{font-size:10px;color:var(--text-sec);font-weight:500;transition:color .3s}
.bv{font-size:13px;font-weight:800;font-feature-settings:"tnum";background:linear-gradient(135deg,var(--green),#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;transition:background .3s;-webkit-text-fill-color:transparent}

/* ── Filters ── */
.fw{display:flex;gap:2px;margin-bottom:6px;background:var(--filter-bg);border-radius:6px;padding:2px;transition:background .3s}
.fl{padding:2px 7px;font-size:9px;font-weight:600;border-radius:4px;cursor:pointer;color:var(--text-sec);transition:all .2s;white-space:nowrap}
.fl-on{background:var(--fl-on-bg);color:var(--accent);box-shadow:var(--fl-on-sh);transition:background .3s,color .3s,box-shadow .3s}
.fl:hover{color:var(--accent)}

/* ── Custom date range ── */
.dr{display:none;flex-wrap:wrap;gap:4px;align-items:center;margin-bottom:6px}
.dr.on{display:flex}
.dr-in{flex:1;min-width:60px;font-size:9px;padding:4px 6px;border:1px solid var(--input-bd);border-radius:5px;background:var(--input-bg);color:var(--text);font-family:inherit;font-weight:500;transition:all .2s}
.dr-in:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(0,255,136,0.1)}
.dr-in::placeholder{color:var(--text-sec);font-weight:400}
.dr-sep{font-size:9px;color:var(--text-sec);font-weight:600;flex-shrink:0}
.dr .go{padding:4px 8px;font-size:9px;font-weight:700;border-radius:5px;cursor:pointer;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;transition:all .2s;flex-shrink:0}
.dr .go:hover{box-shadow:0 2px 8px rgba(0,255,136,0.25);transform:translateY(-1px)}

/* ── Model list ── */
.mc{display:flex;flex-direction:column;gap:3px;background:var(--mc-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:16px;padding:var(--mc-pad,6px);border:var(--mc-bd);box-shadow:var(--card-sh);transition:background .3s,border .3s,box-shadow .3s}
.mi{display:flex;align-items:center;gap:3px;padding:5px 6px;border-radius:8px;background:var(--mi-bg);border:1px solid rgba(var(--cr,148,163,184),var(--mi-bd-op,0.12));transition:all .2s}
.mi:hover{background:rgba(var(--cr,148,163,184),0.06)}
@keyframes breathe{0%,100%{box-shadow:0 0 2px var(--green),0 0 5px var(--green-dim);opacity:.6;transform:scale(1)}50%{box-shadow:0 0 3px var(--green),0 0 8px var(--green-dim),0 0 14px var(--green-dim);opacity:1;transform:scale(1.15)}}
.md{width:5px;height:5px;border-radius:50%;flex-shrink:0;background:var(--mdot-bg);box-shadow:0 0 6px var(--mdot-sh);animation:breathe 2.4s ease-in-out infinite;transition:background .3s}
.mn{flex:1;font-size:10px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:left;transition:color .3s}
.mt{font-size:9px;font-weight:700;font-feature-settings:"tnum";color:rgba(var(--cr,148,163,184),0.6);flex-shrink:0;padding:1px 5px;border-radius:3px;transition:color .3s}
.emp{padding:14px 0;text-align:center;color:var(--text-sec);font-size:10px;font-weight:500;transition:color .3s}
.er{color:var(--red);font-size:11px;padding:8px 12px;text-align:center;background:rgba(239,68,68,0.06);border-radius:8px;font-weight:500}
.hide{display:none}
/* refresh flash */
@keyframes freshen{0%{opacity:.5}100%{opacity:1}}
.fr{animation:freshen .35s ease-out}
</style>
</head>
<body>
<div class=p>
<div class=h>
<div class=hl><div class=ic>OG</div><h1>ocgt-monitor</h1></div>
<div class=hr>
<span class=sd id=sd></span>
<span class=ht id=ht>--:--</span>
<button class=hb id=themeBtn title=切换主题>🌙</button>
<button class=hb id=pinBtn title=固定面板>📌</button>
<button class=qb id=quitBtn title=关闭>✕</button>
</div>
</div>
<div class=c>
<div class=se id=quotaSec><div class=st>套餐额度</div><div class=qn id=quotaLoad><div class=emp>加载中...</div></div></div>
<div class=se>
<div class=st>今日消耗</div>
<div class=tg id=todayGrid>
<div class=ti><div class="tn g1" id=tdIn>--</div><div class=tl>输入</div></div>
<div class=ti><div class="tn g2" id=tdOut>--</div><div class=tl>输出</div></div>
<div class=ti><div class="tn g3" id=tdTot>--</div><div class=tl>总计</div></div>
<div class=ti><div class="tn g4" id=tdReq>--</div><div class=tl>请求</div></div>
</div>
</div>
<div class="se hide" id=balanceSec><div class=st>账户余额</div><div class=bc id=balLoad><span class=bl>加载中...</span></div></div>
<div class=se id=modelSec>
<div class=st>模型消耗</div>
<div class=fw id=modelFilter>
<span class="fl fl-on" data-days=1>今日</span>
<span class=fl data-days=7>7日</span>
<span class=fl data-days=30>30日</span>
<span class=fl data-custom>自定</span>
</div>
<div class=dr id=dr>
<input class=dr-in type=text id=drFrom placeholder="2026-01-01">
<span class=dr-sep>→</span>
<input class=dr-in type=text id=drTo placeholder="2026-06-03">
<button class=go id=drGo>▶</button>
</div>
<div class=mc id=modelLoad><div class=emp>加载中...</div></div>
</div>
</div>
</div>
<script>
var mMode='preset',mDays=1,mFrom='',mTo='';
function n(n){if(n==null)return'0';return n.toLocaleString()}

// ── Theme toggle ──
(function(){
var theme=localStorage.getItem('ocgt-theme')||'light';
document.documentElement.setAttribute('data-theme',theme);
document.getElementById('themeBtn').textContent=theme==='dark'?'☀️':'🌙';
})();
document.getElementById('themeBtn').addEventListener('click',function(){
var html=document.documentElement;
var cur=html.getAttribute('data-theme');
var next=cur==='dark'?'light':'dark';
html.setAttribute('data-theme',next);
localStorage.setItem('ocgt-theme',next);
this.textContent=next==='dark'?'☀️':'🌙';
});

// ── Pin toggle ──
document.getElementById('pinBtn').addEventListener('click',function(){
fetch('/api/pin').then(function(r){return r.json()}).then(function(d){
this.classList.toggle('on',d.pinned);
this.textContent=d.pinned?'📍':'📌';
}.bind(this));
});
fetch('/api/pin-state').then(function(r){return r.json()}).then(function(d){
document.getElementById('pinBtn').classList.toggle('on',d.pinned);
document.getElementById('pinBtn').textContent=d.pinned?'📍':'📌';
});

// ── Quit ──
document.getElementById('quitBtn').addEventListener('click',function(){fetch('/api/quit').then(function(){setTimeout(function(){window.close()},200)})})

// ── Model filter ──
document.getElementById('modelFilter').addEventListener('click',function(e){
var t=e.target;if(!t.classList.contains('fl'))return;
document.querySelectorAll('.fl').forEach(function(f){f.classList.remove('fl-on')});
t.classList.add('fl-on');document.getElementById('dr').classList.remove('on');
if(t.hasAttribute('data-custom')){document.getElementById('dr').classList.add('on');return}
mMode='preset';mDays=parseInt(t.getAttribute('data-days'));fm()})
document.getElementById('drGo').addEventListener('click',function(){
var f=document.getElementById('drFrom').value.trim(),t=document.getElementById('drTo').value.trim();
if(!f||!t||!/^\d{4}-\d{2}-\d{2}$/.test(f)||!/^\d{4}-\d{2}-\d{2}$/.test(t))return;
mMode='custom';mFrom=f;mTo=t;fm()})

// ── Flash refresh ──
function flash(el){if(el){el.classList.remove('fr');void el.offsetWidth;el.classList.add('fr')}}

// ── Main fetch loop ──
async function fa(){
try{await Promise.all([fq(),fb(),fh(),fm().catch(function(){})]);
document.getElementById('sd').className='sd';document.getElementById('ht').textContent=new Date().toLocaleTimeString()
}catch(e){document.getElementById('sd').className='sd er'}}

async function fq(){
var r=await(await fetch('/api/quota')).json(),e=document.getElementById('quotaLoad');
if(!r.success){e.innerHTML='<div class=er>'+r.error+'</div>';return}
var d=r.data;
e.innerHTML=
'<div class=qr><span class=ql>Rolling</span><span class=qv><span class="qp g1">'+d.rolling.usage_percent+'%</span><span class=qtm>'+d.rolling.reset_display+'</span></span></div><div class=qbw><div class="qf g1" style=width:'+d.rolling.usage_percent+'%></div></div>'+
'<div class=qr><span class=ql>Weekly</span><span class=qv><span class="qp g2">'+d.weekly.usage_percent+'%</span><span class=qtm>'+d.weekly.reset_display+'</span></span></div><div class=qbw><div class="qf g2" style=width:'+d.weekly.usage_percent+'%></div></div>'+
(d.monthly?'<div class=qr><span class=ql>Monthly</span><span class=qv><span class="qp g3">'+d.monthly.usage_percent+'%</span><span class=qtm>'+d.monthly.reset_display+'</span></span></div><div class=qbw><div class="qf g3" style=width:'+d.monthly.usage_percent+'%></div></div>':'<div class=qr><span class=ql>Monthly</span><span class=qv><span class="qp g3">∞ 无限</span></span></div>');
flash(e);
}

async function fb(){
var r=await(await fetch('/api/balance')).json();
if(!r.success){document.getElementById('balanceSec').classList.add('hide');return}
document.getElementById('balanceSec').classList.remove('hide');
var d=r.data,e=document.getElementById('balLoad');
e.innerHTML='<span class=bl>可用余额</span><span class=bv>'+d.total_balance.toFixed(2)+' <span style=font-size:10px;color:var(--text-sec)>'+d.currency+'</span></span>';
flash(e);
}

async function fh(){
var r=await(await fetch('/api/history')).json();
if(!r.success||!r.data||!r.data.length)return;
var t=r.data[r.data.length-1];
document.getElementById('tdIn').textContent=n(t.input_tokens||0);
document.getElementById('tdOut').textContent=n(t.output_tokens||0);
document.getElementById('tdTot').textContent=n(t.total_tokens||0);
document.getElementById('tdReq').textContent=t.request_count||0;
flash(document.getElementById('todayGrid'));
}

async function fm(){
var url='/api/models?';
if(mMode==='custom'&&mFrom&&mTo){url+='from='+mFrom+'&to='+mTo}else{url+='days='+mDays}
var r=await(await fetch(url)).json(),e=document.getElementById('modelLoad');
if(!r.success||!r.data||!r.data.length){e.innerHTML='<div class=emp>暂无数据</div>';return}
var cl={'deepseek':'#6366f1','mimo':'#22c55e','glm':'#f59e0b','qwen':'#06b6d4','kimi':'#a855f7','minimax':'#ec4899'};
function cc(n){for(var k in cl)if(n.includes(k))return cl[k];return'#94a3b8'}
function hr(h){return parseInt(h.slice(1,3),16)+','+parseInt(h.slice(3,5),16)+','+parseInt(h.slice(5,7),16)}
var h='';
r.data.forEach(function(m){var c=cc(m.model);h+='<div class=mi style="--cr:'+hr(c)+'"><span class=md></span><span class=mn>'+m.model+'</span><span class=mt>'+n(m.total_tokens||0)+'</span></div>'});
e.innerHTML=h;
flash(e);
}
fa();setInterval(fa,5000)
</script>
</body>
</html>
