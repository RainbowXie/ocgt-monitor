<!DOCTYPE html>
<html lang=zh-CN data-theme=light>
<head>
<meta charset=UTF-8>
<meta name=viewport content="width=device-width,initial-scale=1.0">
<title>ocgt-monitor</title>
<style>
[data-theme=light]{--bg:linear-gradient(180deg,#e8deff 0%,#dcd7fc 30%,#f5ecff 60%,#ffece8 100%);--text:#1a1a2e;--text-sec:#a1a1b5;--text-ter:#7c3aed;--card:rgba(255,255,255,0.30);--card-bd:rgba(255,255,255,0.7);--card-sh:0 8px 32px rgba(0,0,0,0.05);--hdr-bd:rgba(0,0,0,0.03);--input-bg:rgba(255,255,255,0.85);--input-bd:rgba(99,102,241,0.2);--accent:#6366f1;--accent-rgb:99,102,241;--accent2:#a855f7;--green:#22c55e;--green-dim:rgba(34,197,94,0.25);--red:#ef4444;--amber:#f59e0b;--bs-sec:rgba(0,0,0,0.03);--fl-on-bg:rgba(255,255,255,0.8);--mdot-bg:#22c55e;--mdot-sh:rgba(34,197,94,0.3);--st-col:#a1a1b5;--ql-col:#1a1a2e;--glow:0 0 0 1px rgba(255,255,255,0.6) inset;--ch-bg:rgba(0,0,0,0.03)}
[data-theme=dark]{--bg:linear-gradient(180deg,#08081a 0%,#10102e 40%,#1a0a1e 100%);--text:#c8d6e5;--text-sec:#4a5568;--text-ter:#00b8ff;--card:rgba(255,255,255,0.04);--card-bd:rgba(255,255,255,0.06);--card-sh:0 8px 32px rgba(0,0,0,0.5);--hdr-bd:rgba(255,255,255,0.04);--input-bg:rgba(255,255,255,0.03);--input-bd:rgba(0,255,136,0.15);--accent:#00ff88;--accent-rgb:0,255,136;--accent2:#00b8ff;--green:#00ff88;--green-dim:rgba(0,255,136,0.12);--red:#ff3366;--amber:#ff8800;--bs-sec:rgba(0,255,136,0.03);--fl-on-bg:rgba(0,255,136,0.06);--mdot-bg:#00ff88;--mdot-sh:rgba(0,255,136,0.4);--st-col:#4a5568;--ql-col:#4a5568;--glow:0 0 0 1px rgba(255,255,255,0.03) inset;--ch-bg:rgba(0,0,0,0.15)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter','Noto Sans SC',sans-serif;background:var(--bg);width:250px;overflow:hidden;user-select:none;color:var(--text);-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
.p{display:flex;flex-direction:column;height:100vh}
.h{padding:6px 8px 4px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--card);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-bottom:1px solid var(--hdr-bd);box-shadow:var(--glow)}
.hl{display:flex;align-items:center;gap:5px;cursor:grab;position:relative}
.hl:active{cursor:grabbing}.hl::after{content:'';position:absolute;inset:-4px -4px -4px 0;z-index:5}
.ic{width:16px;height:16px;border-radius:4px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;color:#fff;font-size:7px;font-weight:700;box-shadow:0 0 8px rgba(var(--accent-rgb),0.3)}
.hl h1{font-size:10px;font-weight:700;color:var(--text)}
.hr{display:flex;align-items:center;gap:2px}
.sd{width:4px;height:4px;border-radius:50%;background:var(--green);box-shadow:0 0 0 2px var(--green-dim)}
.sd.er{background:var(--red);box-shadow:0 0 0 2px rgba(255,51,102,0.2)}
.ht{font-size:8px;color:var(--text-sec);font-weight:600;font-feature-settings:"tnum"}
.hb{width:16px;height:16px;border-radius:3px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--text-sec);transition:all .2s;position:relative;z-index:6}
.hb:hover{background:rgba(var(--accent-rgb),0.12);color:var(--accent)}
.qb{width:16px;height:16px;border-radius:3px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--text-sec);transition:all .2s;position:relative;z-index:6}
.qb:hover{background:rgba(239,68,68,0.1);color:var(--red)}
.ct{flex:1;overflow:hidden;position:relative}
.tc{position:absolute;inset:0;overflow-y:auto;padding:5px 8px 6px;opacity:0;visibility:hidden;transition:opacity .2s,visibility .2s;scrollbar-width:thin}
.tc::-webkit-scrollbar{width:2px}
.tc::-webkit-scrollbar-thumb{background:var(--bs-sec);border-radius:10px}
.tc.act{opacity:1;visibility:visible}
.tb{display:flex;flex-shrink:0;height:26px;background:var(--card);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-top:1px solid var(--hdr-bd);padding:2px 6px;gap:4px}
.tl{flex:1;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--text-sec);cursor:pointer;border-radius:4px;transition:all .2s}
.tl:hover{color:var(--accent)}.tl.act{background:var(--card);color:var(--accent);box-shadow:var(--card-sh)}
.st{font-size:7px;font-weight:700;color:var(--st-col);letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px;display:flex;align-items:center;gap:4px}
.st::before{content:"";display:inline-block;width:2px;height:7px;border-radius:2px;background:linear-gradient(180deg,var(--accent),var(--accent2))}
/* quota - one-row design */
.qn{margin-bottom:5px;background:var(--card);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-radius:10px;padding:5px 8px;border:var(--card-bd);box-shadow:var(--card-sh),var(--glow)}
.qr{display:flex;align-items:center;gap:4px;margin-bottom:2px;height:16px}
.ql{font-size:8px;font-weight:600;color:var(--ql-col);width:38px;flex-shrink:0}
.qbw{flex:1;height:4px;border-radius:2px;background:var(--bs-sec);overflow:hidden}
.qf{height:100%;border-radius:2px;transition:width .8s cubic-bezier(.22,1,.36,1),background .3s}
.qf.g1{background:linear-gradient(90deg,#6366f1,#a855f7,#ec4899)}
.qf.g2{background:linear-gradient(90deg,#f59e0b,#ef4444,#ec4899)}
.qf.g3{background:linear-gradient(90deg,#06b6d4,#3b82f6,#6366f1)}
.qf.warn{background:linear-gradient(90deg,var(--amber),#ef4444)}
.qf.danger{background:var(--red)}
.qp{font-size:8px;font-weight:700;font-feature-settings:"tnum";min-width:26px;text-align:right}
.qp.g1{color:#a855f7}.qp.g2{color:#ef4444}.qp.g3{color:#3b82f6}
.qp.warn{color:var(--amber)}.qp.danger{color:var(--red)}
.qtm{font-size:7px;color:var(--text-sec);font-weight:500;min-width:14px;text-align:right;font-feature-settings:"tnum"}
/* today */
.tg{display:flex;gap:3px;margin-bottom:5px}
.ti{flex:1;background:var(--card);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-radius:8px;padding:4px 2px;text-align:center;border:var(--card-bd);box-shadow:var(--card-sh),var(--glow)}
.tn{font-size:10px;font-weight:800;font-feature-settings:"tnum";line-height:1.1}
.tn.g1{color:#6366f1}.tn.g2{color:#ef4444}.tn.g3{color:#22c55e}.tn.g4{color:#a855f7}
.tl{font-size:6px;color:var(--text-sec);font-weight:600;letter-spacing:.3px;text-transform:uppercase}
/* balance */
.bc{background:var(--card);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-radius:8px;padding:4px 8px;margin-bottom:5px;border:var(--card-bd);box-shadow:var(--card-sh),var(--glow);display:flex;align-items:center;justify-content:space-between}
.bl{font-size:9px;color:var(--text-sec);font-weight:500}
.bv{font-size:11px;font-weight:800;font-feature-settings:"tnum";background:linear-gradient(135deg,var(--green),#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
/* model filters */
.fw{display:flex;gap:2px;margin-bottom:4px;background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:4px;padding:1px}
.fl{padding:1px 5px;font-size:8px;font-weight:600;border-radius:3px;cursor:pointer;color:var(--text-sec);transition:all .2s;white-space:nowrap}
.fl-on{background:var(--fl-on-bg);color:var(--accent);box-shadow:var(--fl-on-sh)}
.fl:hover{color:var(--accent)}
.dr{display:none;flex-wrap:wrap;gap:3px;align-items:center;margin-bottom:4px}
.dr.on{display:flex}
.dr-in{flex:1;min-width:50px;font-size:8px;padding:2px 4px;border:1px solid var(--input-bd);border-radius:3px;background:var(--input-bg);color:var(--text);font-family:inherit;font-weight:500}
.dr-in:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(var(--accent-rgb),0.15)}
.dr-sep{font-size:8px;color:var(--text-sec);font-weight:600}
.dr .go{padding:2px 6px;font-size:8px;font-weight:700;border-radius:3px;cursor:pointer;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;transition:all .2s}
/* model list */
.ml{display:flex;flex-direction:column;gap:2px}
.mi{display:flex;align-items:center;gap:2px;padding:3px 5px;border-radius:5px;background:rgba(var(--cr,148,163,184),0.04);transition:all .2s}
.mi:hover{background:rgba(var(--cr,148,163,184),0.1)}
@keyframes breathe{0%,100%{box-shadow:0 0 2px var(--green),0 0 4px var(--green-dim);opacity:.6}50%{box-shadow:0 0 3px var(--green),0 0 6px var(--green-dim),0 0 10px var(--green-dim);opacity:1}}
.md{width:4px;height:4px;border-radius:50%;flex-shrink:0;background:var(--mdot-bg);box-shadow:0 0 4px var(--mdot-sh);animation:breathe 2.4s ease-in-out infinite}
.mn{flex:1;font-size:9px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:left}
.mt{font-size:8px;font-weight:700;font-feature-settings:"tnum";color:rgba(var(--cr,148,163,184),0.5);flex-shrink:0}
/* dashboard charts */
.dc{background:var(--card);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-radius:10px;padding:6px 8px;border:var(--card-bd);box-shadow:var(--card-sh),var(--glow);margin-bottom:5px}
.bc-c{display:flex;align-items:flex-end;height:72px;gap:2px;padding:2px 2px 0}
.bc-b{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
.bc-v{width:100%;border-radius:2px 2px 0 0;min-height:2px;transition:height .6s cubic-bezier(.22,1,.36,1)}
.bc-l{font-size:6px;color:var(--text-sec);font-weight:500;margin-top:2px;font-feature-settings:"tnum"}
.dn{display:flex;align-items:center;gap:10px}
.dn-c{width:68px;height:68px;border-radius:50%;flex-shrink:0;background:var(--ch-bg)}
.dn-l{flex:1;display:flex;flex-direction:column;gap:2px}
.dn-i{display:flex;align-items:center;gap:4px;font-size:7px;color:var(--text-sec);font-weight:500}
.dn-d{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dn-n{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dn-p{font-weight:700;font-feature-settings:"tnum"}
.emp{padding:8px 0;text-align:center;color:var(--text-sec);font-size:9px;font-weight:500}
.er{padding:5px 8px;text-align:center;color:var(--red);font-size:10px;background:rgba(239,68,68,0.06);border-radius:5px;font-weight:500}
.hide{display:none}
</style>
</head>
<body>
<div class=p>
<div class=h>
<div class=hl id=dragHdr><div class=ic>OG</div><h1>ocgt-monitor</h1></div>
<div class=hr>
<span class=sd id=sd></span><span class=ht id=ht>--:--</span>
<button class=hb id=themeBtn title=主题>🌙</button>
<button class=hb id=pinBtn title=固定>📌</button>
<button class=qb id=quitBtn title=关闭>✕</button>
</div>
</div>
<div class=ct>
<div class="tc act" id=tOv>
<div class=st>套餐额度</div>
<div class=qn id=quotaLoad>
<div class=qr><span class=ql>Rolling</span><div class=qbw><div class="qf g1" id=qfR style=width:0%></div></div><span class="qp g1" id=qpR>--</span><span class=qtm id=qtR></span></div>
<div class=qr><span class=ql>Weekly</span><div class=qbw><div class="qf g2" id=qfW style=width:0%></div></div><span class="qp g2" id=qpW>--</span><span class=qtm id=qtW></span></div>
<div class=qr id=qrM><span class=ql>Monthly</span><div class=qbw id=qbwM><div class="qf g3" id=qfM style=width:0%></div></div><span class="qp g3" id=qpM>--</span><span class=qtm id=qtM></span></div>
</div>
<div class=st>今日消耗</div>
<div class=tg id=todayGrid>
<div class=ti><div class="tn g1" id=tdIn>--</div><div class=tl>输入</div></div>
<div class=ti><div class="tn g2" id=tdOut>--</div><div class=tl>输出</div></div>
<div class=ti><div class="tn g3" id=tdTot>--</div><div class=tl>总计</div></div>
<div class=ti><div class="tn g4" id=tdReq>--</div><div class=tl>请求</div></div>
</div>
<div class="hide" id=balanceSec><div class=st>账户余额</div><div class=bc id=balLoad><span class=bl>加载中...</span></div></div>
<div class=st>模型消耗</div>
<div class=fw id=modelFilter>
<span class="fl fl-on" data-days=1>今日</span><span class=fl data-days=7>7日</span><span class=fl data-days=30>30日</span><span class=fl data-custom>自定</span>
</div>
<div class=dr id=dr>
<input class=dr-in type=text id=drFrom placeholder="2026-01-01"><span class=dr-sep>→</span>
<input class=dr-in type=text id=drTo placeholder="2026-06-03"><button class=go id=drGo>▶</button>
</div>
<div class=ml id=modelLoad><div class=emp>加载中...</div></div>
</div>
<div class=tc id=tMd>
<div class=st>每日趋势</div>
<div class=dc id=chartLoad><div class=emp>加载中...</div></div>
<div class=st>模型分布</div>
<div class=dc id=donutLoad><div class=emp>加载中...</div></div>
</div>
</div>
<div class=tb>
<span class="tl act" data-tab=ov>概览</span>
<span class=tl data-tab=md>趋势</span>
</div>
</div>
<script>
var mMode='preset',mDays=1,mFrom='',mTo='',hData=[];
function n(n){if(n==null)return'0';return n.toLocaleString()}
/* drag */
var dragY=0,dragStart=0,dragPanelY=0;
document.getElementById('dragHdr').addEventListener('mousedown',function(e){
if(e.button!==0)return;dragStart=e.screenY;dragY=dragPanelY;
var fn=function(m){var d=m.screenY-dragStart,y=Math.max(0,Math.min(3000,dragY+d));fetch('/api/position?y='+y);dragPanelY=y};
var up=function(){document.removeEventListener('mousemove',fn);document.removeEventListener('mouseup',up)};
document.addEventListener('mousemove',fn);document.addEventListener('mouseup',up)});
/* animate number (smooth like digital clock) */
function an(el,t){if(!el)return;var c=parseInt(el.getAttribute('dn')||'0');if(c===t)return;el.setAttribute('dn',t);
var d=350,st=performance.now();function stp(nw){var p=Math.min((nw-st)/d,1),e=1-Math.pow(1-p,3),v=Math.round(c+(t-c)*e);el.textContent=v.toLocaleString();if(p<1)requestAnimationFrame(stp)}requestAnimationFrame(stp)}
/* tab */
document.querySelector('.tb').addEventListener('click',function(e){
var t=e.target;if(!t.classList.contains('tl')||t.classList.contains('act'))return;
document.querySelectorAll('.tl').forEach(function(b){b.classList.remove('act')});t.classList.add('act');
var n=t.getAttribute('data-tab');document.querySelectorAll('.tc').forEach(function(c){c.classList.remove('act');c.style.opacity='0';c.style.visibility='hidden'});
setTimeout(function(){var id='t'+n.charAt(0).toUpperCase()+n.slice(1);document.getElementById(id).classList.add('act');document.getElementById(id).style.opacity='1';document.getElementById(id).style.visibility='visible'},180)});
/* theme / pin / quit */
(function(){var t=localStorage.getItem('ocgt-theme')||'light';document.documentElement.setAttribute('data-theme',t);document.getElementById('themeBtn').textContent=t==='dark'?'☀️':'🌙';})();
document.getElementById('themeBtn').addEventListener('click',function(){var h=document.documentElement,c=h.getAttribute('data-theme'),n=c==='dark'?'light':'dark';h.setAttribute('data-theme',n);localStorage.setItem('ocgt-theme',n);this.textContent=n==='dark'?'☀️':'🌙';});
document.getElementById('pinBtn').addEventListener('click',function(){fetch('/api/pin').then(function(r){return r.json()}).then(function(d){this.classList.toggle('on',d.pinned);this.textContent=d.pinned?'📍':'📌';}.bind(this));});
fetch('/api/pin-state').then(function(r){return r.json()}).then(function(d){document.getElementById('pinBtn').classList.toggle('on',d.pinned);document.getElementById('pinBtn').textContent=d.pinned?'📍':'📌';});
document.getElementById('quitBtn').addEventListener('click',function(){fetch('/api/quit').then(function(){setTimeout(function(){window.close()},200)})});
/* model filter */
document.getElementById('modelFilter').addEventListener('click',function(e){var t=e.target;if(!t.classList.contains('fl'))return;document.querySelectorAll('.fl').forEach(function(f){f.classList.remove('fl-on')});t.classList.add('fl-on');document.getElementById('dr').classList.remove('on');if(t.hasAttribute('data-custom')){document.getElementById('dr').classList.add('on');return}mMode='preset';mDays=parseInt(t.getAttribute('data-days'));fm()});
document.getElementById('drGo').addEventListener('click',function(){var f=document.getElementById('drFrom').value.trim(),t=document.getElementById('drTo').value.trim();if(!f||!t||!/^\d{4}-\d{2}-\d{2}$/.test(f)||!/^\d{4}-\d{2}-\d{2}$/.test(t))return;mMode='custom';mFrom=f;mTo=t;fm()});
/* quota threshold helpers */
function bg(p){if(p>95)return'danger';if(p>80)return'warn';return''}
/* fetch: quota - DOM direct update, no innerHTML flicker */
async function fq(){try{
var r=await(await fetch('/api/quota')).json();if(!r.success)throw new Error(r.error);
var d=r.data;
function setQ(id,pct,text,resetId,resetText,cl){
var bar=document.getElementById(id);if(bar){bar.style.width=pct+'%';var w=bg(pct);bar.className='qf';if(w)bar.classList.add('qf',w);else bar.classList.add('qf',cl)}
var pc=document.getElementById(text);if(pc){pc.textContent=pct+'%';var cw=bg(pct);pc.className='qp';if(cw)pc.classList.add('qp',cw);else pc.classList.add('qp',cl)}
var rt=document.getElementById(resetId);if(rt)rt.textContent=resetText}
setQ('qfR',d.rolling.usage_percent,'qpR','qtR',d.rolling.reset_display,'g1');
setQ('qfW',d.weekly.usage_percent,'qpW','qtW',d.weekly.reset_display,'g2');
if(d.monthly){document.getElementById('qbwM').style.display='block';setQ('qfM',d.monthly.usage_percent,'qpM','qtM',d.monthly.reset_display,'g3')}
else{document.getElementById('qbwM').style.display='none';var pm=document.getElementById('qpM');if(pm){pm.textContent='∞';pm.className='qp g3'}var tm=document.getElementById('qtM');if(tm)tm.textContent='无限'}
}catch(e){document.getElementById('quotaLoad').innerHTML='<div class=er>'+e.message+'</div>'}}
/* fetch: balance */
async function fb(){try{var r=await(await fetch('/api/balance')).json();if(!r.success)throw new Error(r.error);
document.getElementById('balanceSec').classList.remove('hide');var d=r.data,e=document.getElementById('balLoad');
e.innerHTML='<span class=bl>可用余额</span><span class=bv>'+d.total_balance.toFixed(2)+' <span style=font-size:8px;color:var(--text-sec)>'+d.currency+'</span></span>'}
catch(e){document.getElementById('balanceSec').classList.add('hide')}}
/* fetch: history + store for charts */
async function fh(){try{var r=await(await fetch('/api/history')).json();if(!r.success||!r.data||!r.data.length)return;
hData=r.data;var t=hData[hData.length-1];an(document.getElementById('tdIn'),t.input_tokens||0);an(document.getElementById('tdOut'),t.output_tokens||0);an(document.getElementById('tdTot'),t.total_tokens||0);an(document.getElementById('tdReq'),t.request_count||0)}catch(e){}}
/* fetch: models */
async function fm(){try{var u='/api/models?';if(mMode==='custom'&&mFrom&&mTo)u+='from='+mFrom+'&to='+mTo;else u+='days='+mDays;
var r=await(await fetch(u)).json();if(!r.success||!r.data||!r.data.length){document.getElementById('modelLoad').innerHTML='<div class=emp>暂无数据</div>';return}
var cl={'deepseek':'#6366f1','mimo':'#22c55e','glm':'#f59e0b','qwen':'#06b6d4','kimi':'#a855f7','minimax':'#ec4899'};function cc(m){for(var k in cl)if(m.includes(k))return cl[k];return'#94a3b8'}function hr(h){return parseInt(h.slice(1,3),16)+','+parseInt(h.slice(3,5),16)+','+parseInt(h.slice(5,7),16)}
var h='';r.data.forEach(function(m){var c=cc(m.model);h+='<div class=mi style="--cr:'+hr(c)+'"><span class=md></span><span class=mn>'+m.model+'</span><span class=mt>'+n(m.total_tokens||0)+'</span></div>'});document.getElementById('modelLoad').innerHTML=h}
catch(e){document.getElementById('modelLoad').innerHTML='<div class=er>'+e.message+'</div>'}}
/* dashboard charts */
function renderBar(d){var e=document.getElementById('chartLoad');if(!d||!d.length){e.innerHTML='<div class=emp>暂无数据</div>';return}
var max=Math.max.apply(Math,d.map(function(x){return x.total_tokens}));if(!max)max=1;
var cs=['#a855f7','#6366f1','#3b82f6','#06b6d4','#22c55e','#f59e0b','#ef4444'];

function renderDonut(){var e=document.getElementById('donutLoad');

var items=r.data.sort(function(a,b){return b.total_tokens-a.total_tokens});var total=items.reduce(function(s,m){return s+m.total_tokens},0);if(!total)total=1;

var segs=[],ang=0,top5=items.slice(0,5),ot=0;if(items.length>5)for(var i=5;i<items.length;i++)ot+=items[i].total_tokens;

if(ot>0){segs.push('#94a3b8 '+ang+'deg 360deg')}

if(ot>0){h+='<div class=dn-i><span class=dn-d style=background:#94a3b8></span><span class=dn-n>其他</span><span class=dn-p>'+Math.round((ot/total)*100)+'%</span></div>'}
h+='</div></div>';e.innerHTML=h});}
