<!DOCTYPE html>
<html lang=zh-CN>
<head>
<meta charset=UTF-8>
<meta name=viewport content="width=device-width,initial-scale=1.0">
<title>ocgt-monitor</title>
<style>
:root{--bg:#ffffff;--surface:#f8f9fa;--border:#e9ecef;--text:#212529;--sec:#6c757d;--ter:#adb5bd;--accent:#4361ee;--green:#2b9348;--yellow:#b8860b;--blue:#1a73e8;--purple:#7c3aed;--red:#dc2626;--mono:'SF Mono','Fira Code',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;width:300px;overflow:hidden;user-select:none}
.panel{display:flex;flex-direction:column;height:100vh;border-left:1px solid var(--border)}
.header{padding:12px 14px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hl{display:flex;align-items:center;gap:8px}
.hicon{width:22px;height:22px;background:var(--accent);border-radius:5px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700}
.hl h1{font-size:13px;font-weight:600}
.hr{display:flex;align-items:center;gap:6px}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 0 2px #eafaf1}
.ht{font-size:9px;color:var(--ter);font-family:var(--mono)}
.c{flex:1;overflow-y:auto;padding:8px 12px;scrollbar-width:thin}
.c::-webkit-scrollbar{width:3px}
.c::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
.se{margin-bottom:12px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.st{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--ter)}
.sen{font-size:8px;color:var(--ter);font-weight:400;text-transform:none;letter-spacing:0}
.qi{display:flex;align-items:center;gap:6px;padding:5px 0}
.ql{width:48px;font-size:11px;font-weight:500;flex-shrink:0}
.qt{flex:1;height:5px;background:var(--surface);border-radius:3px;overflow:hidden}
.qf{height:100%;border-radius:3px;transition:width .8s}
.qf.g{background:var(--green)}.qf.y{background:var(--yellow)}.qf.b{background:var(--blue)}
.qr{width:38px;text-align:right;font-size:10px;color:var(--ter);font-family:var(--mono);flex-shrink:0}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.sc{background:var(--surface);border-radius:5px;padding:7px 6px;text-align:center}
.sc .nm{font-size:15px;font-weight:700;letter-spacing:-.2px;line-height:1.2}
.sc .nm.g{color:var(--green)}.sc .nm.b{color:var(--blue)}.sc .nm.y{color:var(--yellow)}.sc .nm.p{color:var(--purple)}
.sc .lb{font-size:8px;color:var(--ter);text-transform:uppercase;letter-spacing:.2px;margin-top:1px}
.sc .lb .sen{font-size:8px;display:inline}
.br{display:flex;align-items:center;justify-content:space-between;padding:4px 0}
.bl{font-size:11px;color:var(--sec)}
.bv{font-size:16px;font-weight:700;font-family:var(--mono);letter-spacing:-.4px}
.bc{font-size:10px;color:var(--ter);font-weight:400}
.bs{font-size:9px;color:var(--ter);display:flex;gap:10px;justify-content:flex-end}
.ml{}
.mi{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--border)}
.mi:last-child{border-bottom:none}
.md{width:4px;height:4px;border-radius:50%;flex-shrink:0}
.mn{flex:1;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mt{font-size:9px;font-family:var(--mono);color:var(--sec);flex-shrink:0;margin-left:4px}
.mtp{font-size:9px;font-family:var(--mono);color:var(--ter);flex-shrink:0;width:36px;text-align:right}
.emp{text-align:center;padding:12px;color:var(--ter);font-size:11px}
.er{color:var(--red);font-size:11px;padding:6px;text-align:center;background:#fef2f2;border-radius:4px}
.hide{display:none}
</style>
</head>
<body>
<div class=panel>
<div class=header>
<div class=hl><div class=hicon>OG</div><h1>ocgt-monitor</h1></div>
<div class=hr><span class=sdot id=sdot></span><span class=ht id=ht>--:--</span></div>
</div>
<div class=c>
<div class=se id=quotaSec>
<div class=sh><span class=st>套餐额度 <span class=sen>Plan Usage</span></span><span class=ht id=refreshInfo></span></div>
<div class=emp id=quotaLoad>加载中...</div>
</div>
<div class=se>
<div class=sh><span class=st>今日消耗 <span class=sen>Today</span></span></div>
<div class=sg id=todayGrid>
<div class=sc><div class="nm b" id=tdIn>--</div><div class=lb>输入 <span class=sen>Input</span></div></div>
<div class=sc><div class="nm y" id=tdOut>--</div><div class=lb>输出 <span class=sen>Output</span></div></div>
<div class=sc><div class="nm g" id=tdTot>--</div><div class=lb>总计 <span class=sen>Total</span></div></div>
<div class=sc><div class="nm p" id=tdReq>--</div><div class=lb>请求 <span class=sen>Requests</span></div></div>
</div>
</div>
<div class="se hide" id=balanceSec>
<div class=sh><span class=st>账户余额 <span class=sen>Balance</span></span></div>
<div id=balLoad><div class=emp>--</div></div>
</div>
<div class=se id=modelSec>
<div class=sh><span class=st>模型消耗 <span class=sen>Top Models (7d)</span></span></div>
<div class=emp id=modelLoad>加载中...</div>
</div>
</div>
</div>
<script>
function n(n){if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return String(n)}
function qs(id,v){document.getElementById(id).textContent=v}

async function fa(){
try{
await Promise.all([fq(),fh(),fm()]);
var br=await fetch('/api/balance');
var bj=await br.json();
if(bj.success){document.getElementById('balanceSec').classList.remove('hide');fb_display(bj.data)}else{document.getElementById('balanceSec').classList.add('hide')}
document.getElementById('ht').textContent=new Date().toLocaleTimeString();
document.querySelector('.sdot').style.background='var(--green)'
}catch(e){document.querySelector('.sdot').style.background='var(--red)'}
}

async function fq(){
var r=await(await fetch('/api/quota')).json();
var e=document.getElementById('quotaLoad');
if(!r.success){e.innerHTML='<div class=er>'+r.error+'</div>';return}
var d=r.data;
var h='<div class=qi><span class=ql style=color:var(--green)>Rolling</span><div class=qt><div class="qf g" style=width:'+d.rolling.usage_percent+'%></div></div><span class=qr>'+d.rolling.reset_display+'</span></div>';
h+='<div class=qi><span class=ql style=color:var(--yellow)>Weekly</span><div class=qt><div class="qf y" style=width:'+d.weekly.usage_percent+'%></div></div><span class=qr>'+d.weekly.reset_display+'</span></div>';
if(d.monthly)h+='<div class=qi><span class=ql style=color:var(--blue)>Monthly</span><div class=qt><div class="qf b" style=width:'+d.monthly.usage_percent+'%></div></div><span class=qr>'+d.monthly.reset_display+'</span></div>';
else h+='<div class=qi><span class=ql style=color:var(--blue)>Monthly</span><div style=color:var(--ter);font-size:11px>无限 Unlimited</div></div>';
e.innerHTML=h;
}

function fb_display(d){
var e=document.getElementById('balLoad');
e.innerHTML='<div class=br><span class=bl>可用 Available</span><span class=bv>'+d.total_balance.toFixed(2)+' <span class=bc>'+d.currency+'</span></span></div>'+
(d.granted_balance>0||d.topped_up_balance>0?'<div class=bs>'+(d.granted_balance>0?'赠送 Granted: '+d.granted_balance.toFixed(2):'')+(d.topped_up_balance>0?' 充值 Topped: '+d.topped_up_balance.toFixed(2):'')+'</div>':'');
}

async function fh(){
var r=await(await fetch('/api/history')).json();
if(!r.success)return;
var d=r.data;
if(d&&d.length){var t=d[d.length-1];qs('tdIn',n(t.input_tokens||0));qs('tdOut',n(t.output_tokens||0));qs('tdTot',n(t.total_tokens||0));qs('tdReq',t.request_count||0)}
}

async function fm(){
var r=await(await fetch('/api/models')).json();
var e=document.getElementById('modelLoad');
if(!r.success||!r.data||!r.data.length){e.innerHTML='<div class=emp>暂无数据 No data</div>';return}
var colors={'deepseek':'#4361ee','mimo':'#2b9348','glm':'#b8860b','qwen':'#1a73e8','kimi':'#7c3aed','minimax':'#dc2626','default':'#e67e22'};
function modelColor(name){for(var k in colors){if(name.includes(k))return colors[k]}return colors['default']}
function modelShort(name){return name.replace(/^deepseek-/,'df-').replace(/^mimo-/,'mi-').replace(/^glm-/,'gl-').replace(/^qwen/,'qw').replace(/^kimi-/,'km-')}
var h='';r.data.forEach(function(m,i){
var c=modelColor(m.model);
var sn=m.model.length>18?modelShort(m.model):m.model;
h+='<div class=mi><span class=md style=background:'+c+'></span><span class=mn title="'+m.model+'">'+sn+'</span><span class=mt>'+n(m.total_tokens||0)+'</span><span class=mtp>'+m.request_count+'</span></div>'
});
e.innerHTML=h;
}

fa();setInterval(fa,60000)
</script>
</body>
</html>
