<!DOCTYPE html>
<html lang=zh-CN data-theme=light>
<head>
<meta charset=UTF-8>
<meta name=viewport content="width=device-width,initial-scale=1.0">
<title>ocgt-monitor</title>
<style>
[data-theme=light]{--bg:linear-gradient(180deg,#e8deff 0%,#dcd7fc 30%,#f5ecff 60%,#ffece8 100%);--text:#1a1a2e;--text-sec:#94a3b8;--text-ter:#7c3aed;--card:rgba(255,255,255,0.18);--card-bd:rgba(255,255,255,0.7);--card-sh:0 8px 32px rgba(0,0,0,0.05);--hdr-bd:rgba(0,0,0,0.03);--input-bg:rgba(255,255,255,0.85);--input-bd:rgba(99,102,241,0.2);--accent:#6366f1;--accent-rgb:99,102,241;--accent2:#a855f7;--green:#22c55e;--green-dim:rgba(34,197,94,0.25);--red:#ef4444;--amber:#f59e0b;--bs-sec:rgba(0,0,0,0.03);--fl-on-bg:rgba(255,255,255,0.8);--mdot-bg:#22c55e;--mdot-sh:rgba(34,197,94,0.3);--st-col:#94a3b8;--ql-col:#1a1a2e;--glow:0 0 0 1px rgba(255,255,255,0.6) inset;--ch-in:#818cf8;--ch-out:#f472b6;--mt-op:0.5}
[data-theme=dark]{--bg:linear-gradient(180deg,#08081a 0%,#10102e 40%,#1a0a1e 100%);--text:#c8d6e5;--text-sec:#64748b;--text-ter:#00b8ff;--card:rgba(255,255,255,0.06);--card-bd:rgba(255,255,255,0.06);--card-sh:0 8px 32px rgba(0,0,0,0.5);--hdr-bd:rgba(255,255,255,0.04);--input-bg:rgba(255,255,255,0.03);--input-bd:rgba(0,255,136,0.15);--accent:#00ff88;--accent-rgb:0,255,136;--accent2:#00b8ff;--green:#00ff88;--green-dim:rgba(0,255,136,0.12);--red:#ff3366;--amber:#ff8800;--bs-sec:rgba(0,255,136,0.03);--fl-on-bg:rgba(0,255,136,0.06);--mdot-bg:#00ff88;--mdot-sh:rgba(0,255,136,0.4);--st-col:#64748b;--ql-col:#94a3b8;--glow:0 0 0 1px rgba(255,255,255,0.03) inset;--ch-in:#38bdf8;--ch-out:#fb7185;--mt-op:0.75}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter','Noto Sans SC',sans-serif;background:var(--bg);width:360px;overflow:hidden;user-select:none;color:var(--text);-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
.p{display:flex;flex-direction:column;height:100vh}
.h{padding:7px 12px 5px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--card);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-bottom:1px solid var(--hdr-bd);box-shadow:var(--glow)}
.hl{display:flex;align-items:center;gap:6px;cursor:grab;position:relative}
.hl:active{cursor:grabbing}.hl::after{content:'';position:absolute;inset:-4px -4px -4px 0;z-index:5}
.ic{width:18px;height:18px;border-radius:5px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;color:#fff;font-size:8px;font-weight:700;box-shadow:0 0 8px rgba(var(--accent-rgb),0.3)}
.hl h1{font-size:12px;font-weight:700;color:var(--text)}
.hr{display:flex;align-items:center;gap:4px}
.sd{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 0 2px var(--green-dim);transition:background .3s}
.sd.er{background:var(--red);box-shadow:0 0 0 2px rgba(255,51,102,0.2)}
.ht{font-size:10px;color:var(--text-sec);font-weight:600;font-feature-settings:"tnum"}
.ht.er{color:var(--red)}
.hb{width:20px;height:20px;border-radius:4px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text-sec);transition:all .2s;position:relative;z-index:6}
.hb:hover{background:rgba(var(--accent-rgb),0.12);color:var(--accent)}
.hb.on{background:var(--accent);color:#fff;box-shadow:0 0 6px rgba(var(--accent-rgb),0.3)}
.qb{width:20px;height:20px;border-radius:4px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text-sec);transition:all .2s;position:relative;z-index:6}
.qb:hover{background:rgba(239,68,68,0.1);color:var(--red)}
.ct{flex:1;overflow:hidden;position:relative}
.tc{position:absolute;inset:0;overflow-y:auto;padding:8px 12px 10px;opacity:0;visibility:hidden;transition:opacity .2s,visibility .2s;scrollbar-width:thin}
.tc::-webkit-scrollbar{width:3px}
.tc::-webkit-scrollbar-thumb{background:var(--bs-sec);border-radius:10px}
.tc.act{opacity:1;visibility:visible}
.tb{display:flex;flex-shrink:0;height:30px;background:var(--card);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-top:1px solid var(--hdr-bd);padding:2px 12px;gap:6px}
.tl{flex:1;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--text-sec);cursor:pointer;border-radius:5px;transition:all .2s}
.tl:hover{color:var(--accent)}.tl.act{background:var(--card);color:var(--accent);box-shadow:var(--card-sh)}
.st{font-size:9px;font-weight:700;color:var(--st-col);letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px;display:flex;align-items:center;gap:4px}
.st::before{content:"";display:inline-block;width:2px;height:8px;border-radius:2px;background:linear-gradient(180deg,var(--accent),var(--accent2))}
/* quota */
.qn{margin-bottom:6px;background:var(--card);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-radius:10px;padding:6px 12px;border:var(--card-bd);box-shadow:var(--card-sh),var(--glow)}
.qr{display:flex;align-items:center;gap:6px;margin-bottom:3px;height:20px}
.ql{font-size:10px;font-weight:600;color:var(--ql-col);width:48px;flex-shrink:0}
.qbw{flex:1;height:6px;border-radius:3px;background:var(--bs-sec);overflow:hidden}
.qf{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.22,1,.36,1),background .3s}
.qf.g1{background:linear-gradient(90deg,#6366f1,#a855f7,#ec4899)}
.qf.g2{background:linear-gradient(90deg,#f59e0b,#ef4444,#ec4899)}
.qf.g3{background:linear-gradient(90deg,#06b6d4,#3b82f6,#6366f1)}
.qf.warn{background:linear-gradient(90deg,var(--amber),#ef4444)}
.qf.danger{background:var(--red)}
.qp{font-size:10px;font-weight:700;font-feature-settings:"tnum";min-width:32px;text-align:right}
.qp.g1{color:#a855f7}.qp.g2{color:#ef4444}.qp.g3{color:#3b82f6}
.qp.warn{color:var(--amber)}.qp.danger{color:var(--red)}
.qtm{font-size:9px;color:var(--text-sec);font-weight:500;min-width:18px;text-align:right;font-feature-settings:"tnum"}
/* today - now has enough width */
.tg{display:flex;gap:5px;margin-bottom:6px}
.ti{flex:1;background:var(--card);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-radius:10px;padding:6px 4px;text-align:center;border:var(--card-bd);box-shadow:var(--card-sh),var(--glow)}
.tn{font-size:11px;font-weight:800;font-feature-settings:"tnum";line-height:1.3}
.tn.g1{color:#6366f1}.tn.g2{color:#ef4444}.tn.g3{color:#22c55e}.tn.g4{color:#a855f7}
.tl{font-size:8px;color:var(--text-sec);font-weight:600;letter-spacing:.4px;text-transform:uppercase}
.acard{background:var(--card);border:var(--card-bd);border-radius:10px;padding:8px 10px;margin-bottom:8px;box-shadow:var(--card-sh)}
.acard-h{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.acard-dot{width:6px;height:6px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));flex-shrink:0}
.acard-name{font-size:11px;font-weight:700;color:var(--text)}
.qerr{font-size:11px;color:var(--red);padding:4px 0;text-align:center}
/* balance */
.bc{background:var(--card);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-radius:10px;padding:6px 12px;margin-bottom:6px;border:var(--card-bd);box-shadow:var(--card-sh),var(--glow);display:flex;flex-direction:column;gap:2px}
.bc-r{display:flex;align-items:center;justify-content:space-between}
.bl{font-size:11px;color:var(--text-sec);font-weight:500}
.bv{font-size:14px;font-weight:800;font-feature-settings:"tnum";background:linear-gradient(135deg,var(--green),#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.bc-d{font-size:8px;color:var(--text-sec);font-weight:500;display:flex;gap:14px;justify-content:flex-end;opacity:.7}
/* filters */
.fw{display:flex;gap:3px;margin-bottom:5px;background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:6px;padding:3px}
.fl{padding:3px 10px;font-size:10px;font-weight:600;border-radius:4px;cursor:pointer;color:var(--text-sec);transition:all .2s;white-space:nowrap}
.fl-on{background:var(--fl-on-bg);color:var(--accent);box-shadow:var(--fl-on-sh)}
.fl:hover{color:var(--accent)}
.dr{display:none;flex-wrap:wrap;gap:4px;align-items:center;margin-bottom:5px}
.dr.on{display:flex}
.dr-in{flex:1;min-width:70px;font-size:10px;padding:4px 6px;border:1px solid var(--input-bd);border-radius:4px;background:var(--input-bg);color:var(--text);font-family:inherit;font-weight:500}
.dr-in:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(var(--accent-rgb),0.15)}
.dr-sep{font-size:10px;color:var(--text-sec);font-weight:600}
.dr .go{padding:4px 8px;font-size:10px;font-weight:700;border-radius:4px;cursor:pointer;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;transition:all .2s}
/* model list - full names, no ellipsis */
.ml{display:flex;flex-direction:column;gap:3px}
.mi{display:flex;align-items:center;gap:4px;padding:5px 8px;border-radius:6px;background:rgba(var(--cr,148,163,184),0.04);transition:all .2s}
.mi:hover{background:rgba(var(--cr,148,163,184),0.1)}
@keyframes breathe{0%,100%{box-shadow:0 0 2px var(--green),0 0 4px var(--green-dim);opacity:.6}50%{box-shadow:0 0 3px var(--green),0 0 6px var(--green-dim),0 0 10px var(--green-dim);opacity:1}}
.md{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:var(--mdot-bg);box-shadow:0 0 4px var(--mdot-sh);animation:breathe 2.4s ease-in-out infinite}
.mn{flex-shrink:0;font-size:11px;font-weight:600;color:var(--text)}
.mt{font-size:10px;font-weight:700;font-feature-settings:"tnum";color:rgba(var(--cr,148,163,184),var(--mt-op,0.5));flex-shrink:0;margin-left:auto}
/* dashboard */
.dc{background:var(--card);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-radius:10px;padding:8px 12px;border:var(--card-bd);box-shadow:var(--card-sh),var(--glow);margin-bottom:6px}
/* stacked bar - thin & refined */
.bc-c{display:flex;align-items:flex-end;height:100px;gap:6px;padding:0 4px;justify-content:center}
.bc-b{width:26px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;height:100%}
.bc-sk{display:flex;flex-direction:column-reverse;width:100%;border-radius:4px 4px 0 0;overflow:hidden;transition:height .6s cubic-bezier(.22,1,.36,1);gap:1px}
.bc-ip{transition:height .6s ease;background:var(--ch-in);opacity:.95}
.bc-op{transition:height .6s ease;background:var(--ch-out);opacity:.85}
.bc-l{font-size:8px;color:var(--text-sec);font-weight:500;margin-top:3px;font-feature-settings:"tnum"}
.bc-v{font-size:7px;font-weight:700;font-feature-settings:"tnum";color:var(--text-sec);white-space:nowrap;margin-bottom:1px;opacity:.7;line-height:1}
.bc-lg{display:flex;gap:14px;justify-content:center;padding:4px 0 0;border-top:1px solid var(--hdr-bd);margin-top:4px}
.bc-li{display:flex;align-items:center;gap:4px;font-size:8px;color:var(--text-sec);font-weight:500}
.bc-sq{width:7px;height:7px;border-radius:2px;flex-shrink:0}
/* summary */
.sb{display:flex;gap:14px;padding:4px 0 0;justify-content:center}
.sb-i{font-size:9px;color:var(--text-sec);font-weight:500;font-feature-settings:"tnum"}
.sb-l{color:var(--text);font-weight:700}
/* ring donut */
.dn{display:flex;align-items:center;gap:14px}
.dn-c{width:84px;height:84px;border-radius:50%;flex-shrink:0;box-shadow:var(--glow);position:relative}
.dn-c::after{content:attr(data-total);position:absolute;inset:14px;border-radius:50%;background:var(--card);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;font-feature-settings:"tnum";color:var(--text);text-align:center;line-height:1.1;word-break:break-all;padding:2px}
.dn-l{flex:1;display:flex;flex-direction:column;gap:2px}
.dn-i{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--text-sec);font-weight:500}
.dn-d{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dn-n{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dn-p{font-weight:700;font-feature-settings:"tnum";min-width:28px;text-align:right}
.dn-v{font-size:8px;color:var(--text-sec);font-feature-settings:"tnum";opacity:.6;min-width:40px;text-align:right}
.emp{padding:12px 0;text-align:center;color:var(--text-sec);font-size:11px;font-weight:500}
.er{padding:6px 10px;text-align:center;color:var(--red);font-size:11px;background:rgba(239,68,68,0.06);border-radius:6px;font-weight:500}
.hide{display:none}
</style>
</head>
<body>
<div class=p>
<div class=h>
<div class=hl id=dragHdr><div class=ic>OG</div><h1>ocgt-monitor</h1></div>
<div class=hr>
<span class=sd id=sd></span><span class=ht id=ht>--:--</span>
<button class=hb id=themeBtn title=主题>🌙</button>
<button class=hb id=pinBtn title=固定>📌</button>
<button class=qb id=quitBtn title=关闭>✕</button>
</div>
</div>
<div class=ct>
<div class="tc act" id=tOv>
<div class=st>套餐额度</div>
<div class=qn id=accountCards><div class=emp>加载中...</div></div>
<div class=st>今日消耗</div>
<div class=tg id=todayGrid>
<div class=ti><div class="tn g1" id=tdIn>--</div><div class=tl>输入</div></div>
<div class=ti><div class="tn g2" id=tdOut>--</div><div class=tl>输出</div></div>
<div class=ti><div class="tn g3" id=tdTot>--</div><div class=tl>总计</div></div>
<div class=ti><div class="tn g4" id=tdReq>--</div><div class=tl>请求</div></div>
</div>
<div class="hide" id=balanceSec><div class=st>账户余额</div><div class=bc id=balLoad><div class=bc-r><span class=bl>加载中...</span></div></div></div>
<div class=st>模型消耗</div>
<div class=fw id=modelFilter>
<span class="fl fl-on" data-days=1>今日</span><span class=fl data-days=7>7日</span><span class=fl data-days=30>30日</span><span class=fl data-custom>自定</span>
</div>
<div class=dr id=dr>
<input class=dr-in type=text id=drFrom placeholder="2026-01-01"><span class=dr-sep>→</span>
<input class=dr-in type=text id=drTo placeholder="2026-06-03"><button class=go id=drGo>▶</button>
</div>
<div class=ml id=modelLoad><div class=emp>加载中...</div></div>
</div>
<div class=tc id=tMd>
<div class=st>每日趋势</div>
<div class=dc id=chartLoad><div class=emp>加载中...</div></div>
<div class=st>模型分布（30日）</div>
<div class=dc id=donutLoad><div class=emp>加载中...</div></div>
</div>
</div>
<div class=tb>
<span class="tl act" data-tab=ov>概览</span>
<span class=tl data-tab=md>趋势</span>
</div>
</div>
<script>
var mMode='preset',mDays=1,mFrom='',mTo='',hData=[];
function n(n){if(n==null)return'0';return n.toLocaleString()}
function ab(n){if(n>=1e9)return(n/1e9).toFixed(1)+'B';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return String(n)}
/* drag */
var dy=0,ds=0,dpy=0;
document.getElementById('dragHdr').addEventListener('mousedown',function(e){
if(e.button!==0)return;ds=e.screenY;dy=dpy;
var fn=function(m){var d=m.screenY-ds,y=Math.max(0,Math.min(3000,dy+d));fetch('/api/position?y='+y);dpy=y};
var up=function(){document.removeEventListener('mousemove',fn);document.removeEventListener('mouseup',up)};
document.addEventListener('mousemove',fn);document.addEventListener('mouseup',up)});
/* animate number */
function an(el,t){if(!el)return;var c=parseInt(el.getAttribute('dn')||'0');if(c===t)return;el.setAttribute('dn',t);
var d=400,st=performance.now();function stp(nw){var p=Math.min((nw-st)/d,1),e=1-Math.pow(1-p,3),v=Math.round(c+(t-c)*e);el.textContent=v.toLocaleString();if(p<1)requestAnimationFrame(stp)}requestAnimationFrame(stp)}
/* tab */
document.querySelector('.tb').addEventListener('click',function(e){
var t=e.target;if(!t.classList.contains('tl')||t.classList.contains('act'))return;
document.querySelectorAll('.tl').forEach(function(b){b.classList.remove('act')});t.classList.add('act');
var n=t.getAttribute('data-tab');document.querySelectorAll('.tc').forEach(function(c){c.classList.remove('act');c.style.opacity='0';c.style.visibility='hidden'});
setTimeout(function(){var id='t'+n.charAt(0).toUpperCase()+n.slice(1);document.getElementById(id).classList.add('act');document.getElementById(id).style.opacity='1';document.getElementById(id).style.visibility='visible'},180)});
/* theme/pin/quit */
(function(){var t=localStorage.getItem('ocgt-theme')||'light';document.documentElement.setAttribute('data-theme',t);document.getElementById('themeBtn').textContent=t==='dark'?'☀️':'🌙';})();
document.getElementById('themeBtn').addEventListener('click',function(){var h=document.documentElement,c=h.getAttribute('data-theme'),n=c==='dark'?'light':'dark';h.setAttribute('data-theme',n);localStorage.setItem('ocgt-theme',n);this.textContent=n==='dark'?'☀️':'🌙';});
document.getElementById('pinBtn').addEventListener('click',function(){fetch('/api/pin').then(function(r){return r.json()}).then(function(d){this.classList.toggle('on',d.pinned);this.textContent=d.pinned?'📍':'📌';}.bind(this));});
fetch('/api/pin-state').then(function(r){return r.json()}).then(function(d){document.getElementById('pinBtn').classList.toggle('on',d.pinned);document.getElementById('pinBtn').textContent=d.pinned?'📍':'📌';});
document.getElementById('quitBtn').addEventListener('click',function(){fetch('/api/quit').then(function(){setTimeout(function(){window.close()},200)})});
/* model filter */
document.getElementById('modelFilter').addEventListener('click',function(e){var t=e.target;if(!t.classList.contains('fl'))return;document.querySelectorAll('.fl').forEach(function(f){f.classList.remove('fl-on')});t.classList.add('fl-on');document.getElementById('dr').classList.remove('on');if(t.hasAttribute('data-custom')){document.getElementById('dr').classList.add('on');return}mMode='preset';mDays=parseInt(t.getAttribute('data-days'));fm()});
document.getElementById('drGo').addEventListener('click',function(){var f=document.getElementById('drFrom').value.trim(),t=document.getElementById('drTo').value.trim();if(!f||!t||!/^\d{4}-\d{2}-\d{2}$/.test(f)||!/^\d{4}-\d{2}-\d{2}$/.test(t))return;mMode='custom';mFrom=f;mTo=t;fm()});
/* quota */
function bg(p){if(p>95)return'danger';if(p>80)return'warn';return''}
function qesc(s){return String(s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]})}
function qrow(label,u,cl){
if(!u)return '<div class=qr><span class=ql>'+label+'</span><div class=qbw><div class="qf '+cl+'" style="width:0%"></div></div><span class="qp '+cl+'">∞</span><span class=qtm>无限</span></div>';
var pct=u.usage_percent,w=bg(pct),bc=w||cl;
return '<div class=qr><span class=ql>'+label+'</span><div class=qbw><div class="qf '+bc+'" style="width:'+pct+'%"></div></div><span class="qp '+bc+'">'+pct+'%</span><span class=qtm>'+(u.reset_display||'')+'</span></div>';
}
function acard(a){
var body;
if(!a.success){body='<div class=qerr>'+qesc(a.error||'查询失败')+'</div>';}
else{var d=a.quota;body=qrow('Rolling',d.rolling,'g1')+qrow('Weekly',d.weekly,'g2')+qrow('Monthly',d.monthly,'g3');}
return '<div class=acard><div class=acard-h><span class=acard-dot></span><span class=acard-name>'+qesc(a.name)+'</span></div>'+body+'</div>';
}
async function fq(){try{
var r=await(await fetch('/api/accounts')).json();if(!r.success)throw new Error(r.error||'failed');
var h='';if(!r.data||!r.data.length){h='<div class=emp>未配置账户</div>';}else{r.data.forEach(function(a){h+=acard(a)});}
document.getElementById('accountCards').innerHTML=h;
}catch(e){document.getElementById('accountCards').innerHTML='<div class=qerr>'+qesc(e.message)+'</div>';}}
/* balance */
async function fb(){try{var r=await(await fetch('/api/balance')).json();if(!r.success)throw new Error(r.error);
document.getElementById('balanceSec').classList.remove('hide');var d=r.data,e=document.getElementById('balLoad');
var h='<div class=bc-r><span class=bl>可用余额</span><span class=bv>'+d.total_balance.toFixed(2)+' <span style=font-size:10px;font-weight:500;color:var(--text-sec)>'+d.currency+'</span></span></div>';
if(d.granted_balance>0||d.topped_up_balance>0){h+='<div class=bc-d>'+(d.granted_balance>0?'赠送 '+d.granted_balance.toFixed(2):'')+(d.topped_up_balance>0?' 充值 '+d.topped_up_balance.toFixed(2):'')+'</div>'}
e.innerHTML=h}
catch(e){document.getElementById('balanceSec').classList.add('hide')}}
/* history */
async function fh(){try{var r=await(await fetch('/api/history')).json();if(!r.success||!r.data||!r.data.length)return;
hData=r.data;var t=hData[hData.length-1];an(document.getElementById('tdIn'),t.input_tokens||0);an(document.getElementById('tdOut'),t.output_tokens||0);an(document.getElementById('tdTot'),t.total_tokens||0);an(document.getElementById('tdReq'),t.request_count||0)}catch(e){}}
/* models - full names */
async function fm(){try{var u='/api/models?';if(mMode==='custom'&&mFrom&&mTo)u+='from='+mFrom+'&to='+mTo;else u+='days='+mDays;
var r=await(await fetch(u)).json();if(!r.success||!r.data||!r.data.length){document.getElementById('modelLoad').innerHTML='<div class=emp>暂无数据</div>';return}
var cl={'deepseek':'#6366f1','mimo':'#22c55e','glm':'#f59e0b','qwen':'#06b6d4','kimi':'#a855f7','minimax':'#ec4899'};function cc(m){for(var k in cl)if(m.includes(k))return cl[k];return'#94a3b8'}function hr(h){return parseInt(h.slice(1,3),16)+','+parseInt(h.slice(3,5),16)+','+parseInt(h.slice(5,7),16)}
var h='';r.data.forEach(function(m){var c=cc(m.model);h+='<div class=mi style="--cr:'+hr(c)+'"><span class=md></span><span class=mn>'+m.model+'</span><span class=mt>'+n(m.total_tokens||0)+'</span></div>'});document.getElementById('modelLoad').innerHTML=h}
catch(e){document.getElementById('modelLoad').innerHTML='<div class=er>'+e.message+'</div>'}}
/* stacked bar - fixed proportion bug */
function renderBar(d){var e=document.getElementById('chartLoad');if(!d||!d.length){e.innerHTML='<div class=emp>暂无数据</div>';return}
var mx=Math.max.apply(Math,d.map(function(x){return x.input_tokens+x.output_tokens}));if(!mx)mx=1;
var h='<div class=bc-c>';d.forEach(function(x,i){
var tot=x.input_tokens+x.output_tokens,skH=Math.max(1,(tot/mx)*100),ipP=x.input_tokens/tot*100,opP=x.output_tokens/tot*100;
h+='<div class=bc-b><div class=bc-sk style="height:'+skH+'%">';
h+='<div class=bc-op style="height:'+opP+'%"></div><div class=bc-ip style="height:'+ipP+'%"></div>';
h+='</div><div class=bc-v>'+ab(tot)+'</div><div class=bc-l>'+(x.date?x.date.slice(5):'')+'</div></div>'});
h+='</div><div class=bc-lg><span class=bc-li><span class=bc-sq style=background:var(--ch-in)></span>输入</span><span class=bc-li><span class=bc-sq style=background:var(--ch-out)></span>输出</span></div>';
var sum=d.reduce(function(s,x){return s+x.total_tokens},0),avg=Math.round(sum/d.length);
h+='<div class=sb style=border-top:none;margin-top:2px><span class=sb-i>总计 <span class=sb-l>'+n(sum)+'</span></span><span class=sb-i>日均 <span class=sb-l>'+n(avg)+'</span></span></div>';
e.innerHTML=h}
/* ring donut - full names */
function renderDonut(){var e=document.getElementById('donutLoad');
fetch('/api/models?days=30').then(function(r){return r.json()}).then(function(r){if(!r.success||!r.data||!r.data.length){e.innerHTML='<div class=emp>暂无数据</div>';return}
var items=r.data.sort(function(a,b){return b.total_tokens-a.total_tokens});var total=items.reduce(function(s,m){return s+m.total_tokens},0);if(!total)total=1;
var cl={'deepseek':'#6366f1','mimo':'#22c55e','glm':'#f59e0b','qwen':'#06b6d4','kimi':'#a855f7','minimax':'#ec4899'};function cc(m){for(var k in cl)if(m.includes(k))return cl[k];return'#94a3b8'}
var segs=[],ang=0,top5=items.slice(0,5),ot=0;if(items.length>5)for(var i=5;i<items.length;i++)ot+=items[i].total_tokens;
top5.forEach(function(m){var p=m.total_tokens/total;if(p>0.005){var end=ang+p*360;segs.push(cc(m.model)+' '+ang+'deg '+end+'deg');ang=end}else ang+=p*360});
if(ot>0){segs.push('#94a3b8 '+ang+'deg 360deg')}
var h='<div class=dn><div class=dn-c data-total="'+ab(total)+'" style="background:conic-gradient('+segs.join(',')+')"></div><div class=dn-l>';
top5.forEach(function(m){var p=Math.round((m.total_tokens/total)*100);h+='<div class=dn-i><span class=dn-d style=background:'+cc(m.model)+'></span><span class=dn-n>'+m.model+'</span><span class=dn-p>'+p+'%</span><span class=dn-v>'+ab(m.total_tokens)+'</span></div>'});
if(ot>0){h+='<div class=dn-i><span class=dn-d style=background:#94a3b8></span><span class=dn-n>其他</span><span class=dn-p>'+Math.round((ot/total)*100)+'%</span><span class=dn-v>'+ab(ot)+'</span></div>'}
h+='</div></div>';e.innerHTML=h})}
/* main loop 3s */
async function fa(){var ok=true;try{await Promise.all([fq(),fb(),fh(),fm().catch(function(){})]);renderBar(hData);renderDonut()}catch(e){ok=false}
var sd=document.getElementById('sd'),ht=document.getElementById('ht');sd.className=ok?'sd':'sd er';ht.textContent=new Date().toLocaleTimeString();ht.className=ok?'ht':'ht er';if(!ok)ht.textContent+=' ✕'}
fa();setInterval(fa,2000)
</script>
