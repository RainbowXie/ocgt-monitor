<!DOCTYPE html>
<html lang=zh-CN data-theme=light>
<head>
<meta charset=UTF-8>
<meta name=viewport content="width=device-width,initial-scale=1.0">
<title>ocgt-monitor</title>
<style>
[data-theme=light]{--bg:linear-gradient(180deg,#f5f0ff,#f0eef8,#fef5f2 100%);--text:#1a1a2e;--text-sec:#a1a1b5;--text-ter:#7c3aed;--card:rgba(255,255,255,0.75);--card-bd:rgba(255,255,255,0.9);--card-sh:0 4px 20px rgba(0,0,0,0.04);--hdr-bg:transparent;--hdr-bd:transparent;--input-bg:rgba(255,255,255,0.85);--input-bd:rgba(99,102,241,0.2);--accent:#6366f1;--accent-rgb:99,102,241;--accent2:#a855f7;--green:#22c55e;--green-dim:rgba(34,197,94,0.3);--red:#ef4444;--amber:#f59e0b;--bs-sec:rgba(0,0,0,0.03);--fl-on-bg:#fff;--fl-on-sh:0 1px 4px rgba(0,0,0,0.06);--mdot-bg:#22c55e;--mdot-sh:rgba(34,197,94,0.3);--st-col:#a1a1b5;--ql-col:#1a1a2e}
[data-theme=dark]{--bg:#0d0d1a;--text:#c8d6e5;--text-sec:#4a5568;--text-ter:#00b8ff;--card:rgba(255,255,255,0.02);--card-bd:rgba(255,255,255,0.04);--card-sh:none;--hdr-bg:rgba(255,255,255,0.02);--hdr-bd:rgba(255,255,255,0.04);--input-bg:rgba(255,255,255,0.03);--input-bd:rgba(0,255,136,0.15);--accent:#00ff88;--accent-rgb:0,255,136;--accent2:#00b8ff;--green:#00ff88;--green-dim:rgba(0,255,136,0.15);--red:#ff3366;--amber:#ff8800;--bs-sec:rgba(0,255,136,0.03);--fl-on-bg:rgba(0,255,136,0.06);--fl-on-sh:none;--mdot-bg:#00ff88;--mdot-sh:rgba(0,255,136,0.4);--st-col:#4a5568;--ql-col:#4a5568}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter','Noto Sans SC',sans-serif;background:var(--bg);width:250px;overflow:hidden;user-select:none;color:var(--text);-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
.p{display:flex;flex-direction:column;height:100vh}
/* header */
.h{padding:6px 8px 4px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--hdr-bg);border-bottom:1px solid var(--hdr-bd)}
.hl{display:flex;align-items:center;gap:5px}
.ic{width:16px;height:16px;border-radius:4px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;color:#fff;font-size:7px;font-weight:700}
.hl h1{font-size:10px;font-weight:700;color:var(--text)}
.hr{display:flex;align-items:center;gap:2px}
.sd{width:4px;height:4px;border-radius:50%;background:var(--green);box-shadow:0 0 0 2px var(--green-dim)}
.sd.er{background:var(--red);box-shadow:0 0 0 2px rgba(255,51,102,0.2)}
.ht{font-size:8px;color:var(--text-sec);font-weight:600;font-feature-settings:"tnum"}
.hb{width:16px;height:16px;border-radius:3px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--text-sec);transition:all .2s}
.hb:hover{background:rgba(var(--accent-rgb),0.1);color:var(--accent)}
.qb{width:16px;height:16px;border-radius:3px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--text-sec);transition:all .2s}
.qb:hover{background:rgba(239,68,68,0.1);color:var(--red)}
/* tab content container */
.ct{flex:1;overflow:hidden;position:relative}
.tc{position:absolute;inset:0;overflow-y:auto;padding:5px 8px 6px;opacity:0;visibility:hidden;transition:opacity .2s,visibility .2s;scrollbar-width:thin}
.tc::-webkit-scrollbar{width:2px}
.tc::-webkit-scrollbar-thumb{background:var(--bs-sec);border-radius:10px}
.tc.act{opacity:1;visibility:visible}
/* tab bar */
.tb{display:flex;flex-shrink:0;height:26px;background:var(--hdr-bg);border-top:1px solid var(--hdr-bd);padding:2px 6px;gap:4px}
.tl{flex:1;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--text-sec);cursor:pointer;border-radius:4px;transition:all .2s}
.tl:hover{color:var(--accent)}
.tl.act{background:var(--card);color:var(--accent);box-shadow:var(--card-sh)}
/* section title */
.st{font-size:7px;font-weight:700;color:var(--st-col);letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px;display:flex;align-items:center;gap:4px}
.st::before{content:"";display:inline-block;width:2px;height:7px;border-radius:2px;background:linear-gradient(180deg,var(--accent),var(--accent2))}
/* quota */
.qn{margin-bottom:5px;background:var(--card);backdrop-filter:blur(20px);border-radius:10px;padding:6px 8px;border:var(--card-bd);box-shadow:var(--card-sh)}
.qr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1px}
.ql{font-size:8px;font-weight:600;color:var(--ql-col)}
.qv{display:flex;align-items:center;gap:4px}
.qp{font-size:9px;font-weight:700;font-feature-settings:"tnum"}
.qp.g1{color:#a855f7}.qp.g2{color:#ef4444}.qp.g3{color:#3b82f6}
.qp.warn{color:var(--amber)}.qp.danger{color:var(--red)}
.qtm{font-size:7px;color:var(--text-sec);font-weight:500;font-feature-settings:"tnum"}
.qbw{height:3px;border-radius:2px;background:var(--bs-sec);margin-bottom:3px;overflow:hidden;transition:background .3s}
.qf{height:100%;border-radius:2px;transition:width 1s cubic-bezier(.22,1,.36,1),background .3s}
.qf.g1{background:linear-gradient(90deg,#6366f1,#a855f7,#ec4899)}
.qf.g2{background:linear-gradient(90deg,#f59e0b,#ef4444,#ec4899)}
.qf.g3{background:linear-gradient(90deg,#06b6d4,#3b82f6,#6366f1)}
.qf.warn{background:linear-gradient(90deg,var(--amber),#ef4444)}
.qf.danger{background:var(--red)}
/* today */
.tg{display:flex;gap:3px;margin-bottom:5px}
.ti{flex:1;background:var(--card);backdrop-filter:blur(20px);border-radius:8px;padding:4px 2px;text-align:center;border:var(--card-bd);box-shadow:var(--card-sh)}
.tn{font-size:10px;font-weight:800;font-feature-settings:"tnum";line-height:1.1}
.tn.g1{color:#6366f1}.tn.g2{color:#ef4444}.tn.g3{color:#22c55e}.tn.g4{color:#a855f7}
.tl{font-size:6px;color:var(--text-sec);font-weight:600;letter-spacing:.3px;text-transform:uppercase}
/* balance */
.bc{background:var(--card);backdrop-filter:blur(20px);border-radius:8px;padding:4px 8px;margin-bottom:5px;border:var(--card-bd);box-shadow:var(--card-sh);display:flex;align-items:center;justify-content:space-between}
.bl{font-size:9px;color:var(--text-sec);font-weight:500}
.bv{font-size:11px;font-weight:800;font-feature-settings:"tnum";background:linear-gradient(135deg,var(--green),#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
/* filters */
.fw{display:flex;gap:2px;margin-bottom:4px;background:var(--hdr-bg);border-radius:4px;padding:1px}
.fl{padding:1px 5px;font-size:8px;font-weight:600;border-radius:3px;cursor:pointer;color:var(--text-sec);transition:all .2s;white-space:nowrap}
.fl-on{background:var(--fl-on-bg);color:var(--accent);box-shadow:var(--fl-on-sh)}
.fl:hover{color:var(--accent)}
/* date range */
.dr{display:none;flex-wrap:wrap;gap:3px;align-items:center;margin-bottom:4px}
.dr.on{display:flex}
.dr-in{flex:1;min-width:50px;font-size:8px;padding:2px 4px;border:1px solid var(--input-bd);border-radius:3px;background:var(--input-bg);color:var(--text);font-family:inherit;font-weight:500}
.dr-in:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(var(--accent-rgb),0.15)}
.dr-sep{font-size:8px;color:var(--text-sec);font-weight:600}
.dr .go{padding:2px 6px;font-size:8px;font-weight:700;border-radius:3px;cursor:pointer;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;transition:all .2s}
/* model list */
.ml{display:flex;flex-direction:column;gap:2px}
.mi{display:flex;align-items:center;gap:2px;padding:3px 5px;border-radius:5px;background:rgba(var(--cr,148,163,184),0.04);transition:all .2s}
.mi:hover{background:rgba(var(--cr,148,163,184),0.1)}
.md{width:4px;height:4px;border-radius:50%;flex-shrink:0;background:var(--mdot-bg);box-shadow:0 0 4px var(--mdot-sh)}
.mn{flex:1;font-size:9px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:left}
.mt{font-size:8px;font-weight:700;font-feature-settings:"tnum";color:rgba(var(--cr,148,163,184),0.5);flex-shrink:0}
/* micro animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .35s ease-out}
@keyframes breathe{0%,100%{box-shadow:0 0 2px var(--green),0 0 4px var(--green-dim);opacity:.6}50%{box-shadow:0 0 3px var(--green),0 0 6px var(--green-dim),0 0 10px var(--green-dim);opacity:1}}
.md{animation:breathe 2.4s ease-in-out infinite}
/* common */
.emp{padding:8px 0;text-align:center;color:var(--text-sec);font-size:9px;font-weight:500}
.er{padding:5px 8px;text-align:center;color:var(--red);font-size:10px;background:rgba(239,68,68,0.06);border-radius:5px;font-weight:500}
.hide{display:none}
</style>
</head>
<body>
<div class=p>
<div class=h>
<div class=hl><div class=ic>OG</div><h1>ocgt-monitor</h1></div>
<div class=hr>
<span class=sd id=sd></span><span class=ht id=ht>--:--</span>
<button class=hb id=themeBtn title=主题>🌙</button>
<button class=hb id=pinBtn title=固定>📌</button>
<button class=qb id=quitBtn title=关闭>✕</button>
</div>
</div>
<div class=ct>
<!-- Tab: 概览 -->
<div class="tc act" id=tOv>
<div class=st>套餐额度</div>
<div class=qn id=quotaLoad><div class=emp>加载中...</div></div>
<div class=st style=margin-top:3px>今日消耗</div>
<div class=tg id=todayGrid>
<div class=ti><div class="tn g1" id=tdIn>--</div><div class=tl>输入</div></div>
<div class=ti><div class="tn g2" id=tdOut>--</div><div class=tl>输出</div></div>
<div class=ti><div class="tn g3" id=tdTot>--</div><div class=tl>总计</div></div>
<div class=ti><div class="tn g4" id=tdReq>--</div><div class=tl>请求</div></div>
</div>
<div class="hide" id=balanceSec><div class=st style=margin-top:3px>账户余额</div><div class=bc id=balLoad><span class=bl>加载中...</span></div></div>
</div>
<!-- Tab: 模型 -->
<div class=tc id=tMd>
<div class=st>模型消耗</div>
<div class=fw id=modelFilter>
<span class="fl fl-on" data-days=1>今日</span><span class=fl data-days=7>7日</span><span class=fl data-days=30>30日</span><span class=fl data-custom>自定</span>
</div>
<div class=dr id=dr>
<input class=dr-in type=text id=drFrom placeholder="2026-01-01"><span class=dr-sep>→</span>
<input class=dr-in type=text id=drTo placeholder="2026-06-03"><button class=go id=drGo>▶</button>
</div>
<div class=ml id=modelLoad><div class=emp>加载中...</div></div>
</div>
</div>
<div class=tb>
<span class="tl act" data-tab=ov>概览</span>
<span class=tl data-tab=md>模型</span>
</div>
</div>
<script>
var mMode='preset',mDays=1,mFrom='',mTo='';
function n(n){if(n==null)return'0';return n.toLocaleString()}
/* ── animate number ── */
function an(el,t){if(!el)return;var c=parseInt(el.getAttribute('data-n')||'0');if(c===t)return;el.setAttribute('data-n',t);var d=350,st=performance.now();function stp(nw){var p=Math.min((nw-st)/d,1),e=1-Math.pow(1-p,3),v=Math.round(c+(t-c)*e);el.textContent=v.toLocaleString();if(p<1)requestAnimationFrame(stp)}requestAnimationFrame(stp)}
/* ── fadeUp flash ── */
function ff(el){if(!el)return;el.classList.remove('fu');void el.offsetWidth;el.classList.add('fu')}
/* ── tab switch ── */
document.querySelector('.tb').addEventListener('click',function(e){
var t=e.target;if(!t.classList.contains('tl'))return;if(t.classList.contains('act'))return;
document.querySelectorAll('.tl').forEach(function(b){b.classList.remove('act')});t.classList.add('act');
var name=t.getAttribute('data-tab');
var tabs=document.querySelectorAll('.tc');
tabs.forEach(function(c){c.classList.remove('act');c.style.opacity='0';c.style.visibility='hidden'});
var next=document.getElementById('t'+name.charAt(0).toUpperCase()+name.slice(1));
setTimeout(function(){next.classList.add('act');next.style.opacity='1';next.style.visibility='visible'},180)});
/* ── theme ── */
(function(){var t=localStorage.getItem('ocgt-theme')||'light';document.documentElement.setAttribute('data-theme',t);document.getElementById('themeBtn').textContent=t==='dark'?'☀️':'🌙';})();
document.getElementById('themeBtn').addEventListener('click',function(){var h=document.documentElement,c=h.getAttribute('data-theme'),n=c==='dark'?'light':'dark';h.setAttribute('data-theme',n);localStorage.setItem('ocgt-theme',n);this.textContent=n==='dark'?'☀️':'🌙';});
/* ── pin ── */
document.getElementById('pinBtn').addEventListener('click',function(){fetch('/api/pin').then(function(r){return r.json()}).then(function(d){this.classList.toggle('on',d.pinned);this.textContent=d.pinned?'📍':'📌';}.bind(this));});
fetch('/api/pin-state').then(function(r){return r.json()}).then(function(d){document.getElementById('pinBtn').classList.toggle('on',d.pinned);document.getElementById('pinBtn').textContent=d.pinned?'📍':'📌';});
/* ── quit ── */
document.getElementById('quitBtn').addEventListener('click',function(){fetch('/api/quit').then(function(){setTimeout(function(){window.close()},200)})});
/* ── model filter ── */
document.getElementById('modelFilter').addEventListener('click',function(e){var t=e.target;if(!t.classList.contains('fl'))return;document.querySelectorAll('.fl').forEach(function(f){f.classList.remove('fl-on')});t.classList.add('fl-on');document.getElementById('dr').classList.remove('on');if(t.hasAttribute('data-custom')){document.getElementById('dr').classList.add('on');return}mMode='preset';mDays=parseInt(t.getAttribute('data-days'));fm()});
document.getElementById('drGo').addEventListener('click',function(){var f=document.getElementById('drFrom').value.trim(),t=document.getElementById('drTo').value.trim();if(!f||!t||!/^\d{4}-\d{2}-\d{2}$/.test(f)||!/^\d{4}-\d{2}-\d{2}$/.test(t))return;mMode='custom';mFrom=f;mTo=t;fm()});
/* ── helpers ── */
function bc(p){if(p>95)return'danger';if(p>80)return'warn';return''}
function qc(p){if(p>95)return'qf qf-danger';if(p>80)return'qf qf-warn';return'qf'}
/* ── fetch: quota ── */
async function fq(){var r=await(await fetch('/api/quota')).json(),e=document.getElementById('quotaLoad');if(!r.success){e.innerHTML='<div class=er>'+r.error+'</div>';return}
var d=r.data;
function qr(label,cls,pct,reset){var w=bc(pct),cw=w?' qp '+w:' qp '+cls;return'<div class=qr><span class=ql>'+label+'</span><span class=qv><span class="'+cw+'">'+pct+'%</span><span class=qtm>'+reset+'</span></span></div><div class=qbw><div class="'+qc(pct)+'" style=width:'+pct+'%></div></div>'}
e.innerHTML=qr('Rolling','g1',d.rolling.usage_percent,d.rolling.reset_display)+qr('Weekly','g2',d.weekly.usage_percent,d.weekly.reset_display)+(d.monthly?qr('Monthly','g3',d.monthly.usage_percent,d.monthly.reset_display):'<div class=qr><span class=ql>Monthly</span><span class=qv><span class="qp g3">∞ 无限</span></span></div>');ff(e);}
/* ── fetch: balance ── */
async function fb(){var r=await(await fetch('/api/balance')).json();if(!r.success){document.getElementById('balanceSec').classList.add('hide');return}document.getElementById('balanceSec').classList.remove('hide');var d=r.data,e=document.getElementById('balLoad');e.innerHTML='<span class=bl>可用余额</span><span class=bv>'+d.total_balance.toFixed(2)+' <span style=font-size:8px;color:var(--text-sec)>'+d.currency+'</span></span>';ff(e);}
/* ── fetch: history ── */
async function fh(){var r=await(await fetch('/api/history')).json();if(!r.success||!r.data||!r.data.length)return;var t=r.data[r.data.length-1];an(document.getElementById('tdIn'),t.input_tokens||0);an(document.getElementById('tdOut'),t.output_tokens||0);an(document.getElementById('tdTot'),t.total_tokens||0);an(document.getElementById('tdReq'),t.request_count||0);ff(document.getElementById('todayGrid'));}
/* ── fetch: models ── */
async function fm(){var url='/api/models?';if(mMode==='custom'&&mFrom&&mTo){url+='from='+mFrom+'&to='+mTo}else{url+='days='+mDays}
var r=await(await fetch(url)).json(),e=document.getElementById('modelLoad');if(!r.success||!r.data||!r.data.length){e.innerHTML='<div class=emp>暂无数据</div>';return}
var cl={'deepseek':'#6366f1','mimo':'#22c55e','glm':'#f59e0b','qwen':'#06b6d4','kimi':'#a855f7','minimax':'#ec4899'};function cc(m){for(var k in cl)if(m.includes(k))return cl[k];return'#94a3b8'}function hr(h){return parseInt(h.slice(1,3),16)+','+parseInt(h.slice(3,5),16)+','+parseInt(h.slice(5,7),16)}
var h='';r.data.forEach(function(m){var c=cc(m.model);h+='<div class=mi style="--cr:'+hr(c)+'"><span class=md></span><span class=mn>'+m.model+'</span><span class=mt>'+n(m.total_tokens||0)+'</span></div>'});e.innerHTML=h;ff(e);}
/* ── main loop ── */
async function fa(){try{await Promise.all([fq(),fb(),fh(),fm().catch(function(){})]);document.getElementById('sd').className='sd';document.getElementById('ht').textContent=new Date().toLocaleTimeString()}catch(e){document.getElementById('sd').className='sd er'}}
fa();setInterval(fa,5000)
</script>
</body>
</html>
