<!doctype html>
<html lang="zh-CN" data-theme="light">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1.0" />
        <title>foundry-quota-sentinel</title>
        <style>
            [data-theme="light"] {
                --bg: linear-gradient(
                    180deg,
                    #e8deff 0%,
                    #dcd7fc 30%,
                    #f5ecff 60%,
                    #ffece8 100%
                );
                --text: #1a1a2e;
                --text-sec: #94a3b8;
                --text-ter: #7c3aed;
                --card: rgba(255, 255, 255, 0.18);
                --modal: #ffffff;
                --card-bd: rgba(255, 255, 255, 0.7);
                --card-sh: 0 8px 32px rgba(0, 0, 0, 0.05);
                --hdr-bd: rgba(0, 0, 0, 0.03);
                --input-bg: rgba(255, 255, 255, 0.85);
                --input-bd: rgba(99, 102, 241, 0.2);
                --accent: #6366f1;
                --accent-rgb: 99, 102, 241;
                --accent2: #a855f7;
                --green: #22c55e;
                --green-dim: rgba(34, 197, 94, 0.25);
                --red: #ef4444;
                --amber: #f59e0b;
                --bs-sec: rgba(0, 0, 0, 0.03);
                --fl-on-bg: rgba(255, 255, 255, 0.8);
                --mdot-bg: #22c55e;
                --mdot-sh: rgba(34, 197, 94, 0.3);
                --st-col: #94a3b8;
                --ql-col: #1a1a2e;
                --glow: 0 0 0 1px rgba(255, 255, 255, 0.6) inset;
                --ch-in: #818cf8;
                --ch-out: #f472b6;
                --mt-op: 0.5;
            }
            [data-theme="dark"] {
                --bg: linear-gradient(
                    180deg,
                    #08081a 0%,
                    #10102e 40%,
                    #1a0a1e 100%
                );
                --text: #c8d6e5;
                --text-sec: #64748b;
                --text-ter: #00b8ff;
                --card: rgba(255, 255, 255, 0.06);
                --modal: #16162f;
                --card-bd: rgba(255, 255, 255, 0.06);
                --card-sh: 0 8px 32px rgba(0, 0, 0, 0.5);
                --hdr-bd: rgba(255, 255, 255, 0.04);
                --input-bg: rgba(255, 255, 255, 0.03);
                --input-bd: rgba(0, 255, 136, 0.15);
                --accent: #00ff88;
                --accent-rgb: 0, 255, 136;
                --accent2: #00b8ff;
                --green: #00ff88;
                --green-dim: rgba(0, 255, 136, 0.12);
                --red: #ff3366;
                --amber: #ff8800;
                --bs-sec: rgba(0, 255, 136, 0.03);
                --fl-on-bg: rgba(0, 255, 136, 0.06);
                --mdot-bg: #00ff88;
                --mdot-sh: rgba(0, 255, 136, 0.4);
                --st-col: #64748b;
                --ql-col: #94a3b8;
                --glow: 0 0 0 1px rgba(255, 255, 255, 0.03) inset;
                --ch-in: #38bdf8;
                --ch-out: #fb7185;
                --mt-op: 0.75;
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-weight: 400 !important;
            }
            @font-face {
                font-family: "UbuntuMono Nerd Font";
                src: url("UbuntuMonoNerdFont-Regular.ttf") format("truetype");
                font-weight: 400;
                font-style: normal;
                font-display: swap;
            }
            body {
                font-family:
                    "UbuntuMono Nerd Font", -apple-system, BlinkMacSystemFont,
                    "SF Pro Display", "Inter", "Noto Sans SC", sans-serif;
                background: var(--bg);
                width: 100%;
                overflow: hidden;
                user-select: none;
                color: var(--text);
                -webkit-font-smoothing: antialiased;
                transition:
                    background 0.3s,
                    color 0.3s;
            }
            .p {
                display: flex;
                flex-direction: column;
                height: 100vh;
            }
            .h {
                padding: 7px 12px 5px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                flex-shrink: 0;
                background: var(--card);
                backdrop-filter: blur(30px);
                -webkit-backdrop-filter: blur(30px);
                border-bottom: 1px solid var(--hdr-bd);
                box-shadow: var(--glow);
            }
            .hl {
                display: flex;
                align-items: center;
                gap: 6px;
                cursor: grab;
                position: relative;
            }
            .hl:active {
                cursor: grabbing;
            }
            .hl::after {
                content: "";
                position: absolute;
                inset: -4px -4px -4px 0;
                z-index: 5;
            }
            .ic {
                width: 18px;
                height: 18px;
                border-radius: 5px;
                background: linear-gradient(
                    135deg,
                    var(--accent),
                    var(--accent2)
                );
                display: flex;
                align-items: center;
                justify-content: center;
                color: #fff;
                font-size: 8px;
                font-weight: 700;
                box-shadow: 0 0 8px rgba(var(--accent-rgb), 0.3);
            }
            .hl h1 {
                font-size: 12px;
                font-weight: 700;
                color: var(--text);
            }
            .hr {
                display: flex;
                align-items: center;
                gap: 4px;
            }
            .sd {
                width: 5px;
                height: 5px;
                border-radius: 50%;
                background: var(--green);
                box-shadow: 0 0 0 2px var(--green-dim);
                transition: background 0.3s;
            }
            .sd.er {
                background: var(--red);
                box-shadow: 0 0 0 2px rgba(255, 51, 102, 0.2);
            }
            .ht {
                font-size: 10px;
                color: var(--text-sec);
                font-weight: 600;
                font-feature-settings: "tnum";
            }
            .ht.er {
                color: var(--red);
            }
            .hb {
                width: 20px;
                height: 20px;
                border-radius: 4px;
                border: none;
                background: transparent;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 10px;
                color: var(--text-sec);
                transition: all 0.2s;
                position: relative;
                z-index: 6;
            }
            .hb:hover {
                background: rgba(var(--accent-rgb), 0.12);
                color: var(--accent);
            }
            .hb.on {
                background: var(--accent);
                color: #fff;
                box-shadow: 0 0 6px rgba(var(--accent-rgb), 0.3);
            }
            .qb {
                width: 20px;
                height: 20px;
                border-radius: 4px;
                border: none;
                background: transparent;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 11px;
                color: var(--text-sec);
                transition: all 0.2s;
                position: relative;
                z-index: 6;
            }
            .qb:hover {
                background: rgba(239, 68, 68, 0.1);
                color: var(--red);
            }
            .ct {
                flex: 1;
                overflow: hidden;
                position: relative;
            }
            .tc {
                position: absolute;
                inset: 0;
                overflow-y: auto;
                padding: 8px 12px 10px;
                opacity: 0;
                visibility: hidden;
                transition:
                    opacity 0.2s,
                    visibility 0.2s;
                scrollbar-width: thin;
            }
            .tc::-webkit-scrollbar {
                width: 3px;
            }
            .tc::-webkit-scrollbar-thumb {
                background: var(--bs-sec);
                border-radius: 10px;
            }
            .tc.act {
                opacity: 1;
                visibility: visible;
            }
            .tb {
                display: flex;
                flex-shrink: 0;
                height: 30px;
                background: var(--card);
                backdrop-filter: blur(30px);
                -webkit-backdrop-filter: blur(30px);
                border-top: 1px solid var(--hdr-bd);
                padding: 2px 12px;
                gap: 6px;
            }
            .tl {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 10px;
                font-weight: 600;
                letter-spacing: 0.4px;
                text-transform: uppercase;
                color: var(--text-sec);
                cursor: pointer;
                border-radius: 5px;
                transition: all 0.2s;
            }
            .tl:hover {
                color: var(--accent);
            }
            .tl.act {
                background: var(--card);
                color: var(--accent);
                box-shadow: var(--card-sh);
            }
            .st {
                font-size: 9px;
                font-weight: 700;
                color: var(--st-col);
                letter-spacing: 0.5px;
                text-transform: uppercase;
                margin-bottom: 4px;
                display: flex;
                align-items: center;
                gap: 4px;
            }
            .st::before {
                content: "";
                display: inline-block;
                width: 2px;
                height: 8px;
                border-radius: 2px;
                background: linear-gradient(
                    180deg,
                    var(--accent),
                    var(--accent2)
                );
            }
            /* quota */
            .qn {
                margin-bottom: 6px;
                background: var(--card);
                backdrop-filter: blur(30px);
                -webkit-backdrop-filter: blur(30px);
                border-radius: 10px;
                padding: 6px 12px;
                border: var(--card-bd);
                box-shadow: var(--card-sh), var(--glow);
            }
            .qr {
                display: flex;
                align-items: center;
                gap: 6px;
                margin-bottom: 3px;
                height: 20px;
            }
            .ql {
                font-size: 10px;
                font-weight: 600;
                color: var(--ql-col);
                width: 48px;
                flex-shrink: 0;
            }
            .qbw {
                flex: 1;
                height: 6px;
                border-radius: 3px;
                background: var(--bs-sec);
                overflow: hidden;
            }
            .qf {
                height: 100%;
                border-radius: 3px;
                transition:
                    width 0.8s cubic-bezier(0.22, 1, 0.36, 1),
                    background 0.3s;
            }
            .qf.g1 {
                background: linear-gradient(90deg, #6366f1, #a855f7, #ec4899);
            }
            .qf.g2 {
                background: linear-gradient(90deg, #f59e0b, #ef4444, #ec4899);
            }
            .qf.g3 {
                background: linear-gradient(90deg, #06b6d4, #3b82f6, #6366f1);
            }
            .qf.warn {
                background: linear-gradient(90deg, var(--amber), #ef4444);
            }
            .qf.danger {
                background: var(--red);
            }
            .qp {
                font-size: 10px;
                font-weight: 700;
                font-feature-settings: "tnum";
                min-width: 32px;
                text-align: right;
            }
            .qp.g1 {
                color: #a855f7;
            }
            .qp.g2 {
                color: #ef4444;
            }
            .qp.g3 {
                color: #3b82f6;
            }
            .qp.warn {
                color: var(--amber);
            }
            .qp.danger {
                color: var(--red);
            }
            .qtm {
                font-size: 9px;
                color: var(--text-sec);
                font-weight: 500;
                min-width: 18px;
                text-align: right;
                font-feature-settings: "tnum";
            }
            /* today - now has enough width */
            .tg {
                display: flex;
                gap: 5px;
                margin-bottom: 6px;
            }
            .ti {
                flex: 1;
                background: var(--card);
                backdrop-filter: blur(30px);
                -webkit-backdrop-filter: blur(30px);
                border-radius: 10px;
                padding: 6px 4px;
                text-align: center;
                border: var(--card-bd);
                box-shadow: var(--card-sh), var(--glow);
            }
            .tn {
                font-size: 11px;
                font-weight: 800;
                font-feature-settings: "tnum";
                line-height: 1.3;
            }
            .tn.g1 {
                color: #6366f1;
            }
            .tn.g2 {
                color: #ef4444;
            }
            .tn.g3 {
                color: #22c55e;
            }
            .tn.g4 {
                color: #a855f7;
            }
            .tl {
                font-size: 8px;
                color: var(--text-sec);
                font-weight: 600;
                letter-spacing: 0.4px;
                text-transform: uppercase;
            }
            .acard {
                background: var(--card);
                border: var(--card-bd);
                border-radius: 10px;
                padding: 8px 10px;
                margin-bottom: 8px;
                box-shadow: var(--card-sh);
            }
            .acard-h {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 6px;
                margin-bottom: 6px;
            }
            .acard-dot {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: linear-gradient(
                    135deg,
                    var(--accent),
                    var(--accent2)
                );
                flex-shrink: 0;
            }
            .acard-name {
                font-size: 11px;
                font-weight: 700;
                color: var(--text);
            }
            .ctype {
                font-size: 9px;
                font-weight: 600;
                color: var(--text-sec);
                text-transform: uppercase;
                letter-spacing: 0.3px;
            }
            .cname {
                font-size: 12px;
                font-weight: 700;
                color: var(--text);
            }
            .qerr {
                font-size: 11px;
                color: var(--red);
                padding: 4px 0;
                text-align: center;
            }
            /* balance */
            .bc {
                background: var(--card);
                backdrop-filter: blur(30px);
                -webkit-backdrop-filter: blur(30px);
                border-radius: 10px;
                padding: 6px 12px;
                margin-bottom: 6px;
                border: var(--card-bd);
                box-shadow: var(--card-sh), var(--glow);
                display: flex;
                flex-direction: column;
                gap: 2px;
            }
            .bc-r {
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            .bl {
                font-size: 11px;
                color: var(--text-sec);
                font-weight: 500;
            }
            .bv {
                font-size: 14px;
                font-weight: 800;
                font-feature-settings: "tnum";
                background: linear-gradient(135deg, var(--green), #06b6d4);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }
            .bc-d {
                font-size: 8px;
                color: var(--text-sec);
                font-weight: 500;
                display: flex;
                gap: 14px;
                justify-content: flex-end;
                opacity: 0.7;
            }
            /* filters */
            .fw {
                display: flex;
                gap: 3px;
                margin-bottom: 5px;
                background: var(--card);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                border-radius: 6px;
                padding: 3px;
            }
            .fl {
                padding: 3px 10px;
                font-size: 10px;
                font-weight: 600;
                border-radius: 4px;
                cursor: pointer;
                color: var(--text-sec);
                transition: all 0.2s;
                white-space: nowrap;
            }
            .fl-on {
                background: var(--fl-on-bg);
                color: var(--accent);
                box-shadow: var(--fl-on-sh);
            }
            .fl:hover {
                color: var(--accent);
            }
            .dr {
                display: none;
                flex-wrap: wrap;
                gap: 4px;
                align-items: center;
                margin-bottom: 5px;
            }
            .dr.on {
                display: flex;
            }
            .dr-in {
                flex: 1;
                min-width: 70px;
                font-size: 10px;
                padding: 4px 6px;
                border: 1px solid var(--input-bd);
                border-radius: 4px;
                background: var(--input-bg);
                color: var(--text);
                font-family: inherit;
                font-weight: 500;
            }
            .dr-in:focus {
                outline: none;
                border-color: var(--accent);
                box-shadow: 0 0 0 2px rgba(var(--accent-rgb), 0.15);
            }
            .dr-sep {
                font-size: 10px;
                color: var(--text-sec);
                font-weight: 600;
            }
            .dr .go {
                padding: 4px 8px;
                font-size: 10px;
                font-weight: 700;
                border-radius: 4px;
                cursor: pointer;
                background: linear-gradient(
                    135deg,
                    var(--accent),
                    var(--accent2)
                );
                color: #fff;
                border: none;
                transition: all 0.2s;
            }
            /* model list - full names, no ellipsis */
            .ml {
                display: flex;
                flex-direction: column;
                gap: 3px;
            }
            .mi {
                display: flex;
                align-items: center;
                gap: 4px;
                padding: 5px 8px;
                border-radius: 6px;
                background: rgba(var(--cr, 148, 163, 184), 0.04);
                transition: all 0.2s;
            }
            .mi:hover {
                background: rgba(var(--cr, 148, 163, 184), 0.1);
            }
            @keyframes breathe {
                0%,
                100% {
                    box-shadow:
                        0 0 2px var(--green),
                        0 0 4px var(--green-dim);
                    opacity: 0.6;
                }
                50% {
                    box-shadow:
                        0 0 3px var(--green),
                        0 0 6px var(--green-dim),
                        0 0 10px var(--green-dim);
                    opacity: 1;
                }
            }
            .md {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                flex-shrink: 0;
                background: var(--mdot-bg);
                box-shadow: 0 0 4px var(--mdot-sh);
                animation: breathe 2.4s ease-in-out infinite;
            }
            .mn {
                flex-shrink: 0;
                font-size: 11px;
                font-weight: 600;
                color: var(--text);
            }
            .mt {
                font-size: 10px;
                font-weight: 700;
                font-feature-settings: "tnum";
                color: rgba(var(--cr, 148, 163, 184), var(--mt-op, 0.5));
                flex-shrink: 0;
                margin-left: auto;
            }
            /* dashboard */
            .dc {
                background: var(--card);
                backdrop-filter: blur(30px);
                -webkit-backdrop-filter: blur(30px);
                border-radius: 10px;
                padding: 8px 12px;
                border: var(--card-bd);
                box-shadow: var(--card-sh), var(--glow);
                margin-bottom: 6px;
            }
            /* stacked bar - thin & refined */
            .bc-c {
                display: flex;
                align-items: flex-end;
                height: 100px;
                gap: 6px;
                padding: 0 4px;
                justify-content: center;
            }
            .bc-b {
                width: 26px;
                flex-shrink: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                height: 100%;
            }
            .bc-sk {
                display: flex;
                flex-direction: column-reverse;
                width: 100%;
                border-radius: 4px 4px 0 0;
                overflow: hidden;
                transition: height 0.6s cubic-bezier(0.22, 1, 0.36, 1);
                gap: 1px;
            }
            .bc-ip {
                transition: height 0.6s ease;
                background: var(--ch-in);
                opacity: 0.95;
            }
            .bc-op {
                transition: height 0.6s ease;
                background: var(--ch-out);
                opacity: 0.85;
            }
            .bc-l {
                font-size: 8px;
                color: var(--text-sec);
                font-weight: 500;
                margin-top: 3px;
                font-feature-settings: "tnum";
            }
            .bc-v {
                font-size: 7px;
                font-weight: 700;
                font-feature-settings: "tnum";
                color: var(--text-sec);
                white-space: nowrap;
                margin-bottom: 1px;
                opacity: 0.7;
                line-height: 1;
            }
            .bc-lg {
                display: flex;
                gap: 14px;
                justify-content: center;
                padding: 4px 0 0;
                border-top: 1px solid var(--hdr-bd);
                margin-top: 4px;
            }
            .bc-li {
                display: flex;
                align-items: center;
                gap: 4px;
                font-size: 8px;
                color: var(--text-sec);
                font-weight: 500;
            }
            .bc-sq {
                width: 7px;
                height: 7px;
                border-radius: 2px;
                flex-shrink: 0;
            }
            /* summary */
            .sb {
                display: flex;
                gap: 14px;
                padding: 4px 0 0;
                justify-content: center;
            }
            .sb-i {
                font-size: 9px;
                color: var(--text-sec);
                font-weight: 500;
                font-feature-settings: "tnum";
            }
            .sb-l {
                color: var(--text);
                font-weight: 700;
            }
            /* ring donut */
            .dn {
                display: flex;
                align-items: center;
                gap: 14px;
            }
            .dn-c {
                width: 84px;
                height: 84px;
                border-radius: 50%;
                flex-shrink: 0;
                box-shadow: var(--glow);
                position: relative;
            }
            .dn-c::after {
                content: attr(data-total);
                position: absolute;
                inset: 14px;
                border-radius: 50%;
                background: var(--card);
                backdrop-filter: blur(10px);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 8px;
                font-weight: 700;
                font-feature-settings: "tnum";
                color: var(--text);
                text-align: center;
                line-height: 1.1;
                word-break: break-all;
                padding: 2px;
            }
            .dn-l {
                flex: 1;
                display: flex;
                flex-direction: column;
                gap: 2px;
            }
            .dn-i {
                display: flex;
                align-items: center;
                gap: 4px;
                font-size: 9px;
                color: var(--text-sec);
                font-weight: 500;
            }
            .dn-d {
                width: 7px;
                height: 7px;
                border-radius: 50%;
                flex-shrink: 0;
            }
            .dn-n {
                flex: 1;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .dn-p {
                font-weight: 700;
                font-feature-settings: "tnum";
                min-width: 28px;
                text-align: right;
            }
            .dn-v {
                font-size: 8px;
                color: var(--text-sec);
                font-feature-settings: "tnum";
                opacity: 0.6;
                min-width: 40px;
                text-align: right;
            }
            .emp {
                padding: 12px 0;
                text-align: center;
                color: var(--text-sec);
                font-size: 11px;
                font-weight: 500;
            }
            .er {
                padding: 6px 10px;
                text-align: center;
                color: var(--red);
                font-size: 11px;
                background: rgba(239, 68, 68, 0.06);
                border-radius: 6px;
                font-weight: 500;
            }
            .hide {
                display: none;
            }
            .ctxmenu {
                position: fixed;
                z-index: 2000;
                min-width: 130px;
                background: var(--modal);
                border: var(--card-bd);
                border-radius: 10px;
                box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
                padding: 4px;
            }
            .ctxmenu.hide {
                display: none;
            }
            .ctxitem {
                padding: 7px 12px;
                font-size: 12px;
                color: var(--text);
                border-radius: 7px;
                cursor: pointer;
                white-space: nowrap;
            }
            .ctxitem:hover {
                background: rgba(var(--accent-rgb), 0.15);
                color: var(--accent);
            }
            .modal-bg {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.45);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 1000;
            }
            .modal-bg.hide {
                display: none;
            }
            .modal {
                width: 260px;
                background: var(--modal);
                border: var(--card-bd);
                border-radius: 14px;
                box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
                padding: 14px;
            }
            .modal-h {
                display: flex;
                align-items: center;
                justify-content: space-between;
                font-size: 13px;
                font-weight: 700;
                color: var(--text);
                margin-bottom: 12px;
            }
            .modal-x {
                cursor: pointer;
                color: var(--text-sec);
            }
            .modal-sub {
                font-size: 10px;
                color: var(--text-sec);
                margin-bottom: 8px;
            }
            .prov {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 10px 12px;
                border-radius: 10px;
                border: 1px solid var(--input-bd);
                margin-bottom: 8px;
                cursor: pointer;
                transition: all 0.15s;
            }
            .prov:hover {
                border-color: var(--accent);
                background: rgba(var(--accent-rgb), 0.08);
            }
            .prov-n {
                font-size: 13px;
                font-weight: 600;
                color: var(--text);
            }
            .prov-d {
                font-size: 10px;
                color: var(--text-sec);
            }
            .modal-in {
                width: 100%;
                padding: 9px 10px;
                border-radius: 9px;
                border: 1px solid var(--input-bd);
                background: var(--input-bg);
                color: var(--text);
                font-size: 13px;
                font-family: inherit;
                margin-bottom: 10px;
                outline: none;
            }
            .modal-go {
                width: 100%;
                padding: 9px;
                border: none;
                border-radius: 9px;
                background: var(--accent);
                color: #fff;
                font-size: 13px;
                font-weight: 600;
                cursor: pointer;
            }
            #accountCards,
            #dsCards {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
                gap: 8px;
                margin-bottom: 8px;
            }
            #accountCards > *,
            #dsCards > * {
                margin-bottom: 0;
            }
        </style>
    </head>
    <body>
        <div class="p">
            <div class="h">
                <div class="hl" id="dragHdr">
                    <div class="ic">FQS</div>
                    <h1>foundry-quota-sentinel</h1>
                </div>
                <div class="hr">
                    <span class="sd" id="sd"></span
                    ><span class="ht" id="ht">--:--</span>
                    <button class="hb" id="themeBtn" title="主题">🌙</button>
                    <button class="hb" id="pinBtn" title="固定">📌</button>
                    <button class="qb" id="quitBtn" title="关闭">✕</button>
                </div>
            </div>
            <div class="ct">
                <div class="tc act" id="tOv">
                    <div id="accountCards">
                        <div class="emp">加载中...</div>
                    </div>
                    <div id="dsCards"></div>
                    <div class="bc" id="addCard" style="cursor: pointer">
                        <div
                            style="text-align:center;font-size:26px;line-height:1;color:var(--accent)"
                        >
                            ＋
                        </div>
                    </div>
                    <div id="addModal" class="modal-bg hide">
                        <div class="modal">
                            <div class="modal-h">
                                <span>添加账户</span
                                ><span class="modal-x" id="modalClose">✕</span>
                            </div>
                            <div id="modalStep1">
                                <div class="modal-sub">
                                    选择服务商 / Choose provider
                                </div>
                                <div class="prov" data-type="opencode">
                                    <span class="prov-n">OpenCode Go</span
                                    ><span class="prov-d">套餐额度</span>
                                </div>
                                <div class="prov" data-type="deepseek">
                                    <span class="prov-n">DeepSeek</span
                                    ><span class="prov-d">用量 / 余额</span>
                                </div>
                            </div>
                            <div id="modalStep2" class="hide">
                                <div class="modal-sub" id="modalProvLabel"></div>
                                <input
                                    id="modalName"
                                    class="modal-in"
                                    placeholder="账户名称"
                                />
                                <button id="modalGo" class="modal-go">
                                    登录
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div id="ctxMenu" class="ctxmenu hide">
            <div class="ctxitem" id="ctxOpen">打开账户页面</div>
        </div>
        <script src="echarts.min.js"></script>
        <script>
            var mMode = "preset",
                mDays = 1,
                mFrom = "",
                mTo = "",
                hData = [];
            function n(n) {
                if (n == null) return "0";
                return n.toLocaleString();
            }
            function ab(n) {
                if (n >= 1e9) return (n / 1e9).toFixed(1) + "B";
                if (n >= 1e6) return (n / 1e6).toFixed(1) + "M";
                if (n >= 1e3) return (n / 1e3).toFixed(1) + "K";
                return String(n);
            }
            /* drag */
            var dy = 0,
                ds = 0,
                dpy = 0;
            document
                .getElementById("dragHdr")
                .addEventListener("mousedown", function (e) {
                    if (e.button !== 0) return;
                    ds = e.screenY;
                    dy = dpy;
                    var fn = function (m) {
                        var d = m.screenY - ds,
                            y = Math.max(0, Math.min(3000, dy + d));
                        fetch("/api/position?y=" + y);
                        dpy = y;
                    };
                    var up = function () {
                        document.removeEventListener("mousemove", fn);
                        document.removeEventListener("mouseup", up);
                    };
                    document.addEventListener("mousemove", fn);
                    document.addEventListener("mouseup", up);
                });
            /* animate number */
            function an(el, t) {
                if (!el) return;
                var c = parseInt(el.getAttribute("dn") || "0");
                if (c === t) return;
                el.setAttribute("dn", t);
                var d = 400,
                    st = performance.now();
                function stp(nw) {
                    var p = Math.min((nw - st) / d, 1),
                        e = 1 - Math.pow(1 - p, 3),
                        v = Math.round(c + (t - c) * e);
                    el.textContent = v.toLocaleString();
                    if (p < 1) requestAnimationFrame(stp);
                }
                requestAnimationFrame(stp);
            }
            /* theme/pin/quit */
            (function () {
                var t = localStorage.getItem("ocgt-theme") || "light";
                document.documentElement.setAttribute("data-theme", t);
                document.getElementById("themeBtn").textContent =
                    t === "dark" ? "☀️" : "🌙";
            })();
            document
                .getElementById("themeBtn")
                .addEventListener("click", function () {
                    var h = document.documentElement,
                        c = h.getAttribute("data-theme"),
                        n = c === "dark" ? "light" : "dark";
                    h.setAttribute("data-theme", n);
                    localStorage.setItem("ocgt-theme", n);
                    this.textContent = n === "dark" ? "☀️" : "🌙";
                    if (typeof dsRenderCharts === "function")
                        dsRenderCharts(dsLastArr);
                });
            document
                .getElementById("pinBtn")
                .addEventListener("click", function () {
                    fetch("/api/pin")
                        .then(function (r) {
                            return r.json();
                        })
                        .then(
                            function (d) {
                                this.classList.toggle("on", d.pinned);
                                this.textContent = d.pinned ? "📍" : "📌";
                            }.bind(this),
                        );
                });
            fetch("/api/pin-state")
                .then(function (r) {
                    return r.json();
                })
                .then(function (d) {
                    document
                        .getElementById("pinBtn")
                        .classList.toggle("on", d.pinned);
                    document.getElementById("pinBtn").textContent = d.pinned
                        ? "📍"
                        : "📌";
                });
            document
                .getElementById("quitBtn")
                .addEventListener("click", function () {
                    fetch("/api/quit").then(function () {
                        setTimeout(function () {
                            window.close();
                        }, 200);
                    });
                });
            /* quota */
            function bg(p) {
                if (p > 95) return "danger";
                if (p > 80) return "warn";
                return "";
            }
            function qesc(s) {
                return String(s).replace(/[&<>"]/g, function (c) {
                    return {
                        "&": "&amp;",
                        "<": "&lt;",
                        ">": "&gt;",
                        '"': "&quot;",
                    }[c];
                });
            }
            function qrow(label, u, cl) {
                if (!u)
                    return (
                        "<div class=qr><span class=ql>" +
                        label +
                        '</span><div class=qbw><div class="qf ' +
                        cl +
                        '" style="width:0%"></div></div><span class="qp ' +
                        cl +
                        '">∞</span><span class=qtm>无限</span></div>'
                    );
                var pct = u.usage_percent,
                    w = bg(pct),
                    bc = w || cl;
                return (
                    "<div class=qr><span class=ql>" +
                    label +
                    '</span><div class=qbw><div class="qf ' +
                    bc +
                    '" style="width:' +
                    pct +
                    '%"></div></div><span class="qp ' +
                    bc +
                    '">' +
                    pct +
                    "%</span><span class=qtm>" +
                    (u.reset_display || "") +
                    "</span></div>"
                );
            }
            function acard(a) {
                var body;
                if (!a.success) {
                    body =
                        "<div class=qerr>" +
                        qesc(a.error || "查询失败") +
                        "</div>";
                } else {
                    var d = a.quota;
                    body =
                        qrow("Rolling", d.rolling, "g1") +
                        qrow("Weekly", d.weekly, "g2") +
                        qrow("Monthly", d.monthly, "g3");
                }
                return (
                    '<div class=acard data-prov=opencode data-name="' +
                    qesc(a.name) +
                    '"><div class=acard-h><span class=ctype>OpenCode Go</span><span class=cname>' +
                    qesc(a.name) +
                    "</span></div>" +
                    body +
                    "</div>"
                );
            }
            async function fq() {
                try {
                    var r = await (await fetch("/api/accounts")).json();
                    if (!r.success) throw new Error(r.error || "failed");
                    var h = "";
                    if (!r.data || !r.data.length) {
                        h = "<div class=emp>未配置账户</div>";
                    } else {
                        r.data.forEach(function (a) {
                            h += acard(a);
                        });
                    }
                    document.getElementById("accountCards").innerHTML = h;
                } catch (e) {
                    document.getElementById("accountCards").innerHTML =
                        "<div class=qerr>" + qesc(e.message) + "</div>";
                }
            }
            /* deepseek cards */
            /* deepseek echarts 堆叠柱（官网同款：三档蓝 + 圆角顶 + 日期在下柱往上 + tooltip） */
            var dsCharts = {};
            function dsFmtDate(d) {
                var m = /(\d{4})-(\d{2})-(\d{2})/.exec(d || "");
                return m ? parseInt(m[2]) + "-" + parseInt(m[3]) : d;
            }
            function dsAxisFmt(v) {
                return v >= 1e9
                    ? v / 1e9 + "B"
                    : v >= 1e6
                      ? v / 1e6 + "M"
                      : v >= 1e3
                        ? v / 1e3 + "K"
                        : String(v);
            }
            function dsFullDate(d) {
                var m = /(\d{4})-(\d{2})-(\d{2})/.exec(d || "");
                return m
                    ? parseInt(m[1]) +
                          "-" +
                          parseInt(m[2]) +
                          "-" +
                          parseInt(m[3])
                    : d;
            }
            function dsChartOption(days) {
                var cats = days.map(function (x) {
                    return x.date;
                });
                var dark =
                    document.documentElement.getAttribute("data-theme") ===
                    "dark";
                var axc = dark ? "#9aa4b8" : "rgb(2,14,54)";
                var grd = dark ? "rgba(148,163,184,0.18)" : "#D2D8E5";
                return {
                    animation: false,
                    textStyle: {
                        fontFamily: "'UbuntuMono Nerd Font', monospace",
                    },
                    grid: {
                        left: 6,
                        right: 8,
                        top: 8,
                        bottom: 2,
                        containLabel: true,
                    },
                    tooltip: {
                        trigger: "axis",
                        axisPointer: { type: "shadow" },
                        confine: true,
                        textStyle: { fontSize: 11 },
                        formatter: function (ps) {
                            var tot = 0;
                            ps.forEach(function (p) {
                                tot += p.value || 0;
                            });
                            var h =
                                '<div style="margin-bottom:4px;font-weight:600">' +
                                dsFullDate(ps[0].axisValue) +
                                "　" +
                                tot.toLocaleString() +
                                " tokens</div>";
                            ps.slice()
                                .reverse()
                                .forEach(function (p) {
                                    h +=
                                        '<div style="display:flex;justify-content:space-between;gap:18px"><span>' +
                                        p.marker +
                                        p.seriesName +
                                        '</span><span style="font-weight:600">' +
                                        (p.value || 0).toLocaleString() +
                                        "</span></div>";
                                });
                            return h;
                        },
                    },
                    xAxis: {
                        type: "category",
                        data: cats,
                        axisTick: { show: false },
                        axisLine: { lineStyle: { color: grd } },
                        axisLabel: {
                            color: axc,
                            fontSize: 9,
                            formatter: dsFmtDate,
                        },
                    },
                    yAxis: {
                        type: "value",
                        splitLine: { lineStyle: { color: grd } },
                        axisLabel: {
                            color: axc,
                            fontSize: 9,
                            formatter: dsAxisFmt,
                        },
                    },
                    series: [
                        {
                            name: "输出",
                            type: "bar",
                            stack: "t",
                            data: days.map(function (x) {
                                return x.output || 0;
                            }),
                            itemStyle: { color: "#0C70F3" },
                        },
                        {
                            name: "未命中",
                            type: "bar",
                            stack: "t",
                            data: days.map(function (x) {
                                return x.cache_miss || 0;
                            }),
                            itemStyle: { color: "#60B3FE" },
                        },
                        {
                            name: "命中缓存",
                            type: "bar",
                            stack: "t",
                            data: days.map(function (x) {
                                return x.cache_hit || 0;
                            }),
                            itemStyle: {
                                color: "#A0DCFD",
                                borderRadius: [2, 2, 0, 0],
                            },
                        },
                    ],
                };
            }
            var dsLastArr = [];
            function dsRenderCharts(arr) {
                dsLastArr = arr;
                for (var k in dsCharts) {
                    try {
                        dsCharts[k].dispose();
                    } catch (e) {}
                }
                dsCharts = {};
                if (!window.echarts) return;
                arr.forEach(function (c, idx) {
                    if (!c.success) return;
                    (c.models || []).forEach(function (m, midx) {
                        var id = "dsc" + idx + "_" + midx;
                        var el = document.getElementById(id);
                        if (!el) return;
                        var ch = echarts.init(el, null, { renderer: "svg" });
                        ch.setOption(dsChartOption(m.days || []));
                        dsCharts[id] = ch;
                    });
                });
            }
            async function fd() {
                try {
                    var r = await (await fetch("/api/deepseek")).json();
                    var box = document.getElementById("dsCards");
                    if (!r.success) {
                        box.innerHTML =
                            "<div class=er>" +
                            (r.error || "查询失败") +
                            "</div>";
                        return;
                    }
                    var arr = r.data || [];
                    if (!arr.length) {
                        box.innerHTML = "";
                        return;
                    }
                    var h = "";
                    arr.forEach(function (c, idx) {
                        h +=
                            '<div class=bc data-prov=deepseek data-name="' +
                            qesc(c.name) +
                            '">';
                        h +=
                            "<div class=bc-r><span class=ctype>DeepSeek</span><span class=cname>" +
                            qesc(c.name) +
                            (c.success
                                ? ""
                                : ' <span style="color:var(--red);font-size:9px">离线</span>') +
                            "</span></div>";
                        if (!c.success) {
                            h +=
                                "<div class=bc-d style=color:var(--red)>" +
                                qesc(c.error || "查询失败") +
                                "</div>";
                            h +=
                                '<div class=bc-d><span class=dsLogin data-name="' +
                                qesc(c.name) +
                                '" style="cursor:pointer;color:var(--text-sec)">重新登录</span></div>';
                        } else {
                            var s = c.summary || {};
                            h +=
                                "<div class=bc-r><span class=bl>余额</span><span class=bv>" +
                                (s.balance || 0).toFixed(2) +
                                " <span style=font-size:10px;color:var(--text-sec)>" +
                                (s.currency || "") +
                                "</span></span></div>";
                            var ms = c.models || [];
                            if (!ms.length) {
                                h += "<div class=emp>本月暂无用量</div>";
                            }
                            ms.forEach(function (m, midx) {
                                var mt = (m.days || []).reduce(function (s, d) {
                                    return s + (d.total || 0);
                                }, 0);
                                h +=
                                    '<div style="margin-top:8px;display:flex;align-items:baseline;justify-content:space-between;gap:8px"><span style="font-size:10px;color:var(--text-sec)">' +
                                    qesc(m.model) +
                                    '</span><span style="display:flex;align-items:baseline;gap:6px"><span style="font-size:10px;color:var(--text-sec)">Tokens</span><span style="font-size:10px;color:var(--text)">' +
                                    mt.toLocaleString() +
                                    "</span></span></div>";
                                h +=
                                    "<div id=dsc" +
                                    idx +
                                    "_" +
                                    midx +
                                    ' style="height:130px"></div>';
                            });
                        }
                        h += "</div>";
                    });
                    box.innerHTML = h;
                    dsRenderCharts(arr);
                } catch (e) {
                    document.getElementById("dsCards").innerHTML =
                        "<div class=er>" + qesc(e.message) + "</div>";
                }
            }
            function dsDoLogin(name) {
                fetch(
                    "/api/deepseek/login" +
                        (name ? "?name=" + encodeURIComponent(name) : ""),
                ).then(function () {
                    setTimeout(fd, 1500);
                });
            }
            function ocDoLogin(name) {
                fetch(
                    "/api/opencode/login" +
                        (name ? "?name=" + encodeURIComponent(name) : ""),
                );
            }
            document
                .getElementById("dsCards")
                .addEventListener("click", function (e) {
                    var t = e.target;
                    if (t.classList.contains("dsLogin"))
                        dsDoLogin(t.getAttribute("data-name"));
                });
            (function () {
                var modal = document.getElementById("addModal");
                var s1 = document.getElementById("modalStep1");
                var s2 = document.getElementById("modalStep2");
                var nameIn = document.getElementById("modalName");
                var provLabel = document.getElementById("modalProvLabel");
                var curType = "";
                function openModal() {
                    s2.classList.add("hide");
                    s1.classList.remove("hide");
                    modal.classList.remove("hide");
                }
                function closeModal() {
                    modal.classList.add("hide");
                }
                document
                    .getElementById("addCard")
                    .addEventListener("click", openModal);
                document
                    .getElementById("modalClose")
                    .addEventListener("click", closeModal);
                modal.addEventListener("click", function (e) {
                    if (e.target === modal) closeModal();
                });
                document.querySelectorAll(".prov").forEach(function (p) {
                    p.addEventListener("click", function () {
                        curType = p.getAttribute("data-type");
                        provLabel.textContent =
                            (curType === "opencode"
                                ? "OpenCode Go"
                                : "DeepSeek") + " · 账户名称";
                        nameIn.value =
                            curType === "opencode" ? "OpenCode" : "DeepSeek";
                        s1.classList.add("hide");
                        s2.classList.remove("hide");
                        nameIn.focus();
                        nameIn.select();
                    });
                });
                document
                    .getElementById("modalGo")
                    .addEventListener("click", function () {
                        var nm = nameIn.value.trim();
                        if (!nm) return;
                        if (curType === "opencode") ocDoLogin(nm);
                        else dsDoLogin(nm);
                        closeModal();
                    });
                nameIn.addEventListener("keydown", function (e) {
                    if (e.key === "Enter")
                        document.getElementById("modalGo").click();
                });
            })();
            /* 右键菜单：打开账户对应服务商页面（app 内窗口，注入该账户登录态） */
            (function () {
                var menu = document.getElementById("ctxMenu");
                var openItem = document.getElementById("ctxOpen");
                var cur = { prov: "", name: "" };
                function hide() {
                    menu.classList.add("hide");
                }
                function showAt(x, y) {
                    menu.classList.remove("hide");
                    var mw = menu.offsetWidth,
                        mh = menu.offsetHeight;
                    var vx = Math.min(x, window.innerWidth - mw - 6);
                    var vy = Math.min(y, window.innerHeight - mh - 6);
                    menu.style.left = Math.max(4, vx) + "px";
                    menu.style.top = Math.max(4, vy) + "px";
                }
                document.addEventListener("contextmenu", function (e) {
                    var card =
                        e.target.closest && e.target.closest("[data-prov]");
                    if (!card) {
                        hide();
                        return;
                    }
                    e.preventDefault();
                    cur.prov = card.getAttribute("data-prov");
                    cur.name = card.getAttribute("data-name") || "";
                    showAt(e.clientX, e.clientY);
                });
                openItem.addEventListener("click", function () {
                    if (!cur.prov) return;
                    fetch(
                        "/api/open?provider=" +
                            encodeURIComponent(cur.prov) +
                            "&name=" +
                            encodeURIComponent(cur.name),
                    );
                    hide();
                });
                document.addEventListener("click", hide);
                document.addEventListener("scroll", hide, true);
                window.addEventListener("resize", hide);
                document.addEventListener("keydown", function (e) {
                    if (e.key === "Escape") hide();
                });
            })();
            /* main loop */
            async function fa() {
                var ok = true;
                try {
                    await fq();
                } catch (e) {
                    ok = false;
                }
                var sd = document.getElementById("sd"),
                    ht = document.getElementById("ht");
                sd.className = ok ? "sd" : "sd er";
                ht.textContent = new Date().toLocaleTimeString();
                ht.className = ok ? "ht" : "ht er";
                if (!ok) ht.textContent += " ✕";
            }
            fa();
            setInterval(fa, 2000);
            fd();
            setInterval(fd, 30000);
            var winTimer;
            window.addEventListener("resize", function () {
                for (var k in dsCharts) {
                    try {
                        dsCharts[k].resize();
                    } catch (e) {}
                }
                clearTimeout(winTimer);
                winTimer = setTimeout(function () {
                    fetch(
                        "/api/winsize?w=" +
                            window.outerWidth +
                            "&h=" +
                            window.outerHeight,
                    );
                }, 500);
            });
        </script>
    </body>
</html>
